<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR 銷售分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f7f7f5;--surface:#fff;--surface2:#f3f3f0;--border:#e2dedd;--green:#2d7a3a;--green-light:#f0f7f1;--red:#c0392b;--red-light:#fef2f2;--orange:#e67e22;--purple:#6c5ce7;--purple-light:#f3f0ff;--text:#1a1a1a;--muted:#888;--muted2:#bbb}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
header{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}.logo-img{height:30px}.header-title{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px}.spacer{flex:1}.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;transition:all .3s}.dot.ok{background:var(--green);box-shadow:0 0 5px rgba(45,122,58,.4)}.dot.err{background:var(--red)}.dot-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.wrap{max-width:1280px;margin:0 auto;padding:24px 28px}
.sb{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.sb-i{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}.sb-i .dot{width:6px;height:6px}.sb-i.ok{color:var(--green)}.sb-i.ok .dot{background:var(--green)}
.ab{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap}.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#333}.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#256132}.btn:disabled{opacity:.4;cursor:not-allowed}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px}.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;margin-bottom:5px}.card-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.sec{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden}.sec-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}.sec-h h3{font-size:14px;font-weight:600}.sec-badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.sec-tog{font-size:10px;color:var(--muted2);margin-left:auto}.sec-b{overflow:hidden}
.cb{display:flex;gap:6px;padding:12px 18px;flex-wrap:wrap;border-bottom:1px solid var(--surface2)}.chip{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;white-space:nowrap}.chip:hover{border-color:var(--text);color:var(--text)}.chip.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}
table{width:100%;border-collapse:collapse}th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border)}td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--surface2);vertical-align:middle}tr:last-child td{border-bottom:none}tr:hover td{background:#faf9f8}.mono{font-family:'DM Mono',monospace}.text-right{text-align:right}
.bar-cell{display:flex;align-items:center;gap:8px}.bar-bg{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;min-width:60px}.bar-fill{height:100%;border-radius:3px}.bar-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:36px;text-align:right}
.rank{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0}.r1{background:#ffd700;color:#333}.r2{background:#c0c0c0;color:#333}.r3{background:#cd7f32;color:#fff}.rn{background:var(--surface2);color:var(--muted)}
.search-input{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-family:'DM Mono',monospace;color:var(--text);outline:none;width:200px}.search-input:focus{border-color:var(--text)}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px}.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}.hidden{display:none!important}
.pct-bar{display:inline-block;height:14px;border-radius:2px;margin-right:6px;vertical-align:middle}
.tag-chip{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);margin:1px 2px}
/* SELECTION BAR */
.sel-bar{position:fixed;bottom:0;left:0;right:0;background:var(--text);color:#fff;padding:14px 28px;display:flex;align-items:center;gap:16px;z-index:200;transform:translateY(100%);transition:transform .25s;box-shadow:0 -2px 12px rgba(0,0,0,.15)}.sel-bar.show{transform:translateY(0)}.sel-count{font-family:'DM Mono',monospace;font-size:14px;font-weight:700}.sel-btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;background:var(--green);color:#fff;transition:all .15s}.sel-btn:hover{background:#256132}.sel-btn-clear{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff}.sel-btn-clear:hover{border-color:#fff}
/* STUDIO */
.studio{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden}.studio-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--purple-light)}.studio-h h3{font-size:15px;font-weight:600;color:var(--purple)}.studio-body{padding:20px}
.sku-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap}
.sku-img{width:100px;height:130px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.sku-info{flex:1;min-width:200px}
.sku-info h4{font-size:14px;font-weight:600;margin-bottom:6px}
.sku-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px}
.copy-area{background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden}
.copy-header{padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.copy-body{padding:12px;font-size:13px;line-height:1.7;white-space:pre-wrap}
.copy-btn{margin-left:auto;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;cursor:pointer}.copy-btn:hover{border-color:var(--text);color:var(--text)}
.angle-chip{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-family:'DM Mono',monospace;margin:2px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted)}.angle-chip.active{background:var(--purple);border-color:var(--purple);color:#fff}
.gen-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
.row-sel td{background:var(--purple-light)!important}
.chk{width:16px;height:16px;cursor:pointer;accent-color:var(--purple)}
/* STUDIO WORKSPACE */
.ws-grid{display:grid;grid-template-columns:280px 1fr;gap:20px;min-height:400px}
@media(max-width:768px){.ws-grid{grid-template-columns:1fr}}
.ws-left{display:flex;flex-direction:column;gap:12px}
.ws-right{display:flex;flex-direction:column;gap:12px}
.ws-panel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px}
.ws-panel-title{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.photo-thumb{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s}.photo-thumb:hover{border-color:var(--purple)}.photo-thumb.picked{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-light)}
.upload-mini{border:2px dashed var(--border);border-radius:6px;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:11px;color:var(--muted);gap:4px;position:relative}.upload-mini:hover{border-color:var(--purple);color:var(--purple)}.upload-mini input{position:absolute;inset:0;opacity:0;cursor:pointer}
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tpl-card{border:2px solid var(--border);border-radius:6px;padding:10px;cursor:pointer;transition:all .15s;text-align:center}.tpl-card:hover{border-color:var(--purple)}.tpl-card.picked{border-color:var(--purple);background:var(--purple-light)}
.tpl-preview{height:48px;border-radius:4px;margin-bottom:6px}
.tpl-name{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.preview-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.preview-tab{flex:1;padding:8px;text-align:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}.preview-tab:hover{color:var(--text)}.preview-tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
.preview-frame{background:#f0f0ee;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:300px}
.preview-frame iframe{border:none;background:#fff}
.gen-btn{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;font-weight:600;background:var(--purple);color:#fff;width:100%;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}.gen-btn:hover{background:#5a4bd6}.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.result-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.result-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-family:'DM Mono',monospace}
.result-actions{margin-left:auto;display:flex;gap:6px}
</style>
</head>
<body>
<!-- PASSWORD WALL -->
<div id="authWall" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;max-width:360px;width:90%">
    <img src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" style="height:28px;margin-bottom:20px" onerror="this.style.display='none'">
    <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:16px">銷售分析</div>
    <input type="password" id="authPw" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')authCheck()" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;outline:none;margin-bottom:12px">
    <button onclick="authCheck()" style="width:100%;padding:10px;border:none;border-radius:6px;background:var(--text);color:#fff;font-family:'DM Mono',monospace;font-size:13px;font-weight:600;cursor:pointer">進入</button>
    <div id="authErr" style="color:var(--red);font-size:12px;margin-top:10px;display:none">密碼錯誤</div>
  </div>
</div>
<script>
function authCheck(){if(document.getElementById('authPw').value==='28447208'){document.getElementById('authWall').style.display='none';sessionStorage.setItem('enamor_auth','1')}else{document.getElementById('authErr').style.display='block'}}
if(sessionStorage.getItem('enamor_auth')==='1')document.getElementById('authWall').style.display='none';
</script>

<header>
  <img class="logo-img" src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" alt="EnamoR" onerror="this.style.display='none'">
  <span class="header-title">銷售分析</span>
  <div class="spacer"></div>
  <div class="dot" id="dot"></div>
  <span class="dot-label" id="dotLabel">待連線</span>
</header>

<div class="wrap">
  <div class="sb">
    <div class="sb-i" id="sbOms"><div class="dot"></div>OMS</div>
    <div class="sb-i" id="sbSup"><div class="dot"></div>對照表</div>
    <div class="sb-i" id="sbOrd"><div class="dot"></div>訂單</div>
  </div>
  <div class="ab">
    <button class="btn btn-primary" id="btnFetch" onclick="fetchAll()">📡 拉取銷售數據</button>
    <div class="cb" style="border:none;padding:0;gap:4px">
      <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-right:4px">區間</span>
      <div class="chip active" onclick="setDays(7,this)">7天</div>
      <div class="chip" onclick="setDays(14,this)">14天</div>
      <div class="chip" onclick="setDays(30,this)">30天</div>
    </div>
    <span id="fetchSt" style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace"></span>
    <div class="spacer"></div>
    <button class="btn btn-green hidden" id="btnExp" onclick="exportAll()">⬇ 匯出 Excel</button>
  </div>
  <div class="loading hidden" id="ldArea"><span class="spinner"></span><span id="ldMsg">讀取中...</span></div>

  <div id="content" class="hidden">
    <!-- SUMMARY -->
    <div class="sg" id="sumGrid"></div>

    <!-- SKU RANKING -->
    <div class="sec" id="secRank">
      <div class="sec-h" onclick="tog('rankBody')"><h3>📊 SKU 銷售排行</h3><span class="sec-badge" id="rankBadge">0</span><div class="spacer"></div><input class="search-input" placeholder="搜尋貨號/品名..." oninput="skuQ=this.value;renderRank()" onclick="event.stopPropagation()"><span class="sec-tog" id="rankTog">▼</span></div>
      <div class="sec-b" id="rankBody"><div class="cb" id="seriesChips"></div><div id="rankTbl"></div></div>
    </div>

    <!-- SERIES BREAKDOWN -->
    <div class="sec" id="secSeries">
      <div class="sec-h" onclick="tog('seriesBody')"><h3>🏷 系列銷售佔比</h3><span class="sec-tog" id="seriesTog">▼</span></div>
      <div class="sec-b" id="seriesBody"><div id="seriesTbl"></div></div>
    </div>

    <!-- MATERIAL BREAKDOWN -->
    <div class="sec" id="secMat">
      <div class="sec-h" onclick="tog('matBody')"><h3>🧶 材質銷售佔比</h3><span class="sec-tog" id="matTog">▼</span></div>
      <div class="sec-b" id="matBody"><div id="matTbl"></div></div>
    </div>

    <!-- RISE BREAKDOWN -->
    <div class="sec" id="secRise">
      <div class="sec-h" onclick="tog('riseBody')"><h3>📐 腰高銷售佔比</h3><span class="sec-tog" id="riseTog">▼</span></div>
      <div class="sec-b" id="riseBody"><div id="riseTbl"></div></div>
    </div>

    <!-- SPEC BREAKDOWN -->
    <div class="sec" id="secSpec">
      <div class="sec-h" onclick="tog('specBody')"><h3>👗 品類銷售佔比</h3><span class="sec-tog" id="specTog">▼</span></div>
      <div class="sec-b" id="specBody"><div id="specTbl"></div></div>
    </div>

    <!-- VENDOR BREAKDOWN -->
    <div class="sec" id="secVendor">
      <div class="sec-h" onclick="tog('vendorBody')"><h3>🏭 供應商銷售佔比</h3><span class="sec-tog" id="vendorTog">▼</span></div>
      <div class="sec-b" id="vendorBody"><div id="vendorTbl"></div></div>
    </div>

    <!-- DAILY TREND -->
    <div class="sec" id="secDaily">
      <div class="sec-h" onclick="tog('dailyBody')"><h3>📅 每日銷售趨勢</h3><span class="sec-tog" id="dailyTog">▼</span></div>
      <div class="sec-b" id="dailyBody"><div id="dailyTbl"></div></div>
    </div>

    <!-- STUDIO -->
    <div class="studio hidden" id="studioSec">
      <div class="studio-h"><h3>🎨 素材工作站</h3><span class="sec-badge" id="studioBadge">0 品項</span><div class="spacer"></div><button class="sel-btn" style="background:var(--green)" onclick="exportStudio()">⬇ 匯出全部素材</button></div>
      <div class="studio-body" id="studioBody">
        <!-- SKU 選擇列 -->
        <div class="cb" id="studioSkuChips" style="padding:12px 0;border-bottom:1px solid var(--border)"></div>
        <!-- 當前 SKU 工作區 -->
        <div id="studioWork" style="padding:16px 0">
          <div class="loading">請從上方 SKU 排行勾選品項</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SELECTION BAR -->
<div class="sel-bar" id="selBar">
  <span class="sel-count" id="selCount">0</span><span style="font-size:12px">品項已選</span>
  <div class="spacer"></div>
  <button class="sel-btn sel-btn-clear" onclick="clearSel()">清除選取</button>
  <button class="sel-btn" onclick="openStudio()">🎨 進入素材工作站 →</button>
</div>

<div class="toast" id="toast"></div>

<script>
const P='https://enamor-oms.vercel.app/api/oms-proxy',TK='28447208';
const SID='1jYnzBWyvF23asaPFjqYaEl5LXOg77inIaJlCMkzdOS8',SK='AIzaSyCrFGNy_-YgRWsrOw0H_tfTqeCbnIkVZA8';
let supMap={},items=[],orders=[],days=7,skuQ='',seriesF='all',selected=new Set();
const COLORS=['#2d7a3a','#6c5ce7','#e67e22','#c0392b','#0984e3','#00b894','#d63031','#636e72','#fdcb6e','#e17055'];
const SKIP=new Set(['999999','platform_coin','SHIPFEE','seller_discount','Discount','universal_products']);

async function oP(ep,b){const r=await fetch(P,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':TK},body:JSON.stringify({endpoint:ep,body:b})});return r.json()}

async function ldSup(){
  const u=`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/A:Q?key=${SK}`;
  const r=await fetch(u);if(!r.ok)throw new Error('Sheet '+r.status);
  const j=await r.json();const rows=j.values||[];if(rows.length<2)throw new Error('Sheet空');
  const h=rows[0],ci=n=>h.indexOf(n);
  const iC=ci('商品條碼'),iV=ci('廠商編號'),iN=ci('廠商名稱'),iS=ci('廠商貨號'),iSz=ci('尺寸說明'),iCo=ci('廠商顏色說明'),iAct=ci('Shopify啟用');
  const iSer=ci('Series'),iMat=ci('Mat'),iRise=ci('Rise'),iSpec=ci('Spec'),iFeat=ci('Feature'),iPrice=ci('Price');
  supMap={};
  rows.slice(1).forEach(r=>{
    const c=(r[iC]||'').trim();
    const active=(r[iAct]||'').trim();
    if(c&&active==='V'&&!supMap[c])supMap[c]={
      vid:(r[iV]||'').trim(),vn:(r[iN]||'').trim(),vs:(r[iS]||'').trim(),vsz:(r[iSz]||'').trim(),vc:(r[iCo]||'').trim(),
      series:(r[iSer]||'').trim(),mat:(r[iMat]||'').trim(),rise:(r[iRise]||'').trim(),spec:(r[iSpec]||'').trim(),
      feat:(r[iFeat]||'').trim(),price:(r[iPrice]||'').trim()
    };
  });
  return Object.keys(supMap).length;
}

function setDays(d,el){days=d;document.querySelectorAll('.ab .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active')}

async function fetchAll(){
  const btn=document.getElementById('btnFetch');btn.disabled=true;
  document.getElementById('ldArea').classList.remove('hidden');

// ── PARSE ─────────────────────────────────────────────────────────────
function getSkuData(){
  const map={};
  items.forEach(i=>{
    const model=(i['orders_products.products_model']||'').trim();
    const qty=parseInt(i['orders_products.products_quantity']||0);
    const price=parseFloat(i['orders_products.products_price']||0);
    const total=parseFloat(i['orders_products.total_price']||0);
    const name=(i['orders_products.products_name']||'').trim();
    const orderId=(i['orders_products.orders_id']||'').trim();
    if(!model||qty<=0||SKIP.has(model))return;
    if(!map[model])map[model]={model,name,qty:0,revenue:0,orders:new Set()};
    map[model].qty+=qty;
    map[model].revenue+=total||price*qty;
    map[model].orders.add(orderId);
  });
  return Object.values(map).map(s=>{
    const sup=supMap[s.model]||{};
    return{...s,orderCount:s.orders.size,vid:sup.vid||'未對照',vn:sup.vn||'',series:sup.series||'',mat:sup.mat||'',rise:sup.rise||'',spec:sup.spec||'',feat:sup.feat||'',vsz:sup.vsz||'',vc:sup.vc||''};
  }).sort((a,b)=>b.qty-a.qty);
}

function getDailyData(){
  const map={};
  orders.forEach(o=>{
    const dt=(o['orders.created_at']||'').slice(0,10);
    const amt=parseFloat(o['orders.orders_amt']||0);
    if(!dt)return;
    if(!map[dt])map[dt]={date:dt,orders:0,revenue:0};
    map[dt].orders++;
    map[dt].revenue+=amt;
  });
  return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
}

function groupBy(data,key){
  const map={};let total=0;
  data.forEach(d=>{
    const v=d[key]||'未標記';
    if(!map[v])map[v]={label:v,qty:0,revenue:0,skuCount:0};
    map[v].qty+=d.qty;map[v].revenue+=d.revenue;map[v].skuCount++;
    total+=d.qty;
  });
  return Object.values(map).sort((a,b)=>b.qty-a.qty).map(g=>({...g,pct:total>0?Math.round(g.qty/total*1000)/10:0}));
}

function pickImg(model,idx){
  const d=studioData[model];
  const allImgs=[...d.images,...d.uploads];
  d.pickedImg=allImgs[idx]||d.images[idx];
  renderWork();
}

function uploadImg(model,input){
  const files=Array.from(input.files);
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      studioData[model].uploads.push(e.target.result);
      studioData[model].images.push(e.target.result);
      renderWork();
    };
    reader.readAsDataURL(f);
  });
  input.value='';
}

let pickedAngle=null,pickedTpl='dark';
function toggleAngle(el,id){
  document.querySelectorAll('.angle-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  pickedAngle=id;
}
function pickTpl(id){
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('picked'));
  document.getElementById('tpl-'+id)?.classList.add('picked');
  pickedTpl=id;
}

let activePreview='feed';
function switchPreview(id,el){
  activePreview=id;
  document.querySelectorAll('.preview-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  // Show matching result if exists
  const d=studioData[activeStudioSku];
  if(!d)return;
  const result=d.results.find(r=>r.sizeId===id&&r.angleId===pickedAngle&&r.tplId===pickedTpl);
  if(result)showPreview(result.html,id);
}

function showPreview(html,sizeId){
  const sz=SIZES.find(s=>s.id===sizeId)||SIZES[0];
  const frame=document.getElementById('previewFrame');
  const scale=Math.min(frame.clientWidth/sz.w,400/sz.h,1);
  const sw=Math.round(sz.w*scale),sh=Math.round(sz.h*scale);
  frame.innerHTML=`<iframe width="${sw}" height="${sh}" srcdoc="${html.replace(/"/g,'&quot;')}" style="transform-origin:top left"></iframe>`;
}

async function generateCreative(){
  const s=getSkuData().find(x=>x.model===activeStudioSku);
  if(!s){toast('請選擇品項');return}
  const d=studioData[s.model];
  if(!d.pickedImg){toast('請先選擇一張照片');return}
  if(!pickedAngle){toast('請選擇文案角度');return}
  const angle=ANGLES.find(a=>a.id===pickedAngle);
  const tpl=TEMPLATES.find(t=>t.id===pickedTpl);
  const tags=[s.series,s.mat,s.rise,s.spec,s.feat].filter(Boolean).join('、');
  const sz=SIZES.find(si=>si.id===activePreview);
  const seriesLabel=(s.series||'ZERO-TEX').toUpperCase();

  const existing=d.results.map(r=>r.headline).filter(Boolean).join('\n');
  const excludeNote=existing?`\n\n以下主標題已經用過，請避免重複：\n${existing}`:'';

  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.innerHTML='<span class="gen-spinner"></span>文案生成中...';

  // Step 1: Claude API 只產文案（不產 HTML）
  const prompt=`你是 EnamoR 恩娜茉兒的文案寫手。
品牌風格：平鋪直述、不煽情、口語但不隨便、關鍵處留白。
禁用「超值」「限時」「搶購」「最好」「第一」和驚嘆號。
${BRAND_VOICE}

商品：${s.name||s.model}
標籤：${tags}
文案角度：${angle.label} — ${angle.prompt}
${excludeNote}

請用 JSON 格式回傳，不要 markdown，不要解釋：
{"headline":"主標題（7-12字，有力量）","sub":"副文案（兩行，每行10-15字，用\\n分隔）","caption":"底部一句話（10-18字）","cta":"CTA按鈕文字（3-5字）"}`;

  let copy={headline:'穿了就忘了',sub:'不緊繃的自由感\n不捲邊的舒適度',caption:'杜邦萊卡高彈力，一整天不捲不滑',cta:'了解更多'};
  try{
    const r=await fetch('https://enamor-line-bot.vercel.app/api/claude-proxy',{
      method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':'28447208'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})
    });
    const data=await r.json();
    let txt=(data.content?.map(c=>c.text||'').join('')||'').trim();
    txt=txt.replace(/^```json?\n?/,'').replace(/\n?```$/,'').trim();
    try{copy=JSON.parse(txt)}catch(e){console.warn('JSON parse fail, using default copy',txt)}
  }catch(e){toast('文案生成失敗：'+e.message)}

  // Step 2: 用預製模板填入文案 + 照片
  const imgUrl=d.pickedImg.startsWith('data:')?d.pickedImg:`${d.pickedImg}&width=${Math.max(sz.w,sz.h)}`;
  const html=buildTemplate(tpl,sz,imgUrl,copy,seriesLabel);

  const result={id:Date.now(),sizeId:activePreview,angleId:pickedAngle,tplId:pickedTpl,html,headline:copy.headline,angle:angle.label,tpl:tpl.label,size:sz.label};
  d.results.push(result);
  showPreview(html,activePreview);
  renderResults();
  toast('✓ 素材已生成');
  btn.disabled=false;btn.innerHTML='✨ 生成素材';
}

function buildTemplate(tpl,sz,imgUrl,copy,seriesLabel){
  const w=sz.w,h=sz.h;
  const subLines=(copy.sub||'').split('\n').map(l=>`<div>${l}</div>`).join('');
  const isStory=sz.id==='story';
  const isLine=sz.id==='line';

  if(tpl.id==='dark') return tplDark(w,h,imgUrl,copy,subLines,seriesLabel,isStory,isLine);
  if(tpl.id==='light') return tplLight(w,h,imgUrl,copy,subLines,seriesLabel,isStory,isLine);
  return tplWarm(w,h,imgUrl,copy,subLines,seriesLabel,isStory,isLine);
}

function renderResults(){
  const d=studioData[activeStudioSku];
  if(!d||!d.results.length){document.getElementById('resultsArea').innerHTML='';return}
  document.getElementById('resultsArea').innerHTML=`
    <div class="ws-panel-title" style="margin-top:12px">已生成素材 (${d.results.length})</div>
    ${d.results.map(r=>`<div class="result-card">
      <div class="result-header">
        <span>${r.angle}</span><span class="tag-chip">${r.tpl}</span><span class="tag-chip">${r.size}</span>
        ${r.headline?`<span style="color:var(--text);font-weight:600;margin-left:4px">${r.headline}</span>`:''}
        <div class="result-actions">
          <button class="copy-btn" onclick="showPreview(studioData['${activeStudioSku}'].results.find(x=>x.id===${r.id}).html,'${r.sizeId}')">預覽</button>
          <button class="copy-btn" onclick="copyHtml(${r.id})">複製 HTML</button>
          <button class="copy-btn" onclick="downloadHtml(${r.id})" style="border-color:var(--green);color:var(--green)">下載</button>
        </div>
      </div>
    </div>`).join('')}`;
}

function copyHtml(resultId){
  const d=studioData[activeStudioSku];
  const r=d?.results.find(x=>x.id===resultId);
  if(r){navigator.clipboard.writeText(r.html);toast('HTML 已複製')}
}

function downloadHtml(resultId){
  const d=studioData[activeStudioSku];
  const r=d?.results.find(x=>x.id===resultId);
  if(!r)return;
  const blob=new Blob([r.html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${activeStudioSku}_${r.angle}_${r.size}_${r.id}.html`;
  a.click();
  toast('✓ 已下載');
}

function exportStudio(){
  const skus=getSkuData().filter(s=>selected.has(s.model));
  if(!skus.length){toast('沒有選品');return}
  const wb=XLSX.utils.book_new();
  const rows=[['商品條碼','商品名稱','角度','風格','版位','主標題']];
  skus.forEach(s=>{
    const d=studioData[s.model]||{results:[]};
    d.results.forEach(r=>rows.push([s.model,s.name,r.angle,r.tpl,r.size,r.headline]));
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'素材清單');
  XLSX.writeFile(wb,`${new Date().toISOString().slice(0,10).replace(/-/g,'')}_素材工作站.xlsx`);
  toast('✓ 已匯出');
}
