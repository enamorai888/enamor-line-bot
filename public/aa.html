<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>EnamoR 第二波｜Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --charcoal: #1C1C1A;
  --warm-white: #FAFAF7;
  --accent: #8B6F47;
  --accent-light: #C4A882;
  --light: #9C9A92;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:540px; height:540px;
  overflow:hidden; background:var(--charcoal);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; } to { opacity:1; }
}
@keyframes lineGrow {
  from { transform:scaleX(0); } to { transform:scaleX(1); }
}
@keyframes photoPull {
  from { transform:scale(1.06); } to { transform:scale(1); }
}
@keyframes slideLeft {
  from { opacity:0; transform:translateX(-16px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes sideLineGrow {
  from { transform:scaleY(0); } to { transform:scaleY(1); }
}

.feed {
  width:540px; height:540px;
  background:var(--charcoal);
  position:relative; overflow:hidden;
}
.feed .photo {
  position:absolute;
  right:-60px; top:0;
  width:72%; height:100%;
  object-fit:cover; object-position:center top;
  transform:scale(1.06);
  animation:photoPull 1.4s ease forwards;
}
.feed .overlay {
  position:absolute; inset:0;
  background:linear-gradient(
    to right,
    rgba(28,28,26,1.0)  0%,
    rgba(28,28,26,0.97) 35%,
    rgba(28,28,26,0.7)  55%,
    rgba(28,28,26,0.15) 80%,
    rgba(28,28,26,0.0)  100%
  );
  animation:fadeIn 0.8s ease 0.3s both;
}
.feed .side-line {
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(to bottom, transparent, var(--accent) 35%, var(--accent) 75%, transparent);
  z-index:3; transform:scaleY(0); transform-origin:top;
  animation:sideLineGrow 0.8s ease 0.5s forwards;
}
.feed .top-row {
  position:absolute; top:24px; left:20px; right:20px;
  display:flex; align-items:center; justify-content:space-between; z-index:3;
  opacity:0; animation:fadeIn 0.5s ease 0.6s forwards;
}
.feed .logo-img { height:18px; width:auto; opacity:0.9; }
.feed .mit {
  border:1px solid rgba(196,168,130,0.3); padding:3px 8px;
  font-size:7px; letter-spacing:2px;
  color:var(--accent-light); text-transform:uppercase;
}
.feed .content {
  position:absolute; left:0; top:0; width:52%; height:100%;
  display:flex; flex-direction:column; justify-content:center;
  padding:44px 28px 44px 24px; z-index:3;
}
.feed .eyebrow {
  font-size:8px; letter-spacing:4px;
  color:var(--accent-light); text-transform:uppercase;
  margin-bottom:16px; opacity:0;
  animation:fadeUp 0.6s ease 0.7s forwards;
}
.feed h1 {
  font-family:Georgia,serif; font-weight:300;
  font-size:26px; color:var(--warm-white);
  line-height:1.5; margin-bottom:6px;
  opacity:0; animation:fadeUp 0.7s ease 0.9s forwards;
}
.feed h1 em { font-style:italic; color:var(--accent-light); }
.feed .h1-line2 {
  display:block; opacity:0;
  animation:fadeUp 0.7s ease 1.05s forwards;
}
.feed .divider {
  width:28px; height:1px; background:var(--accent);
  margin:14px 0; transform:scaleX(0); transform-origin:left;
  animation:lineGrow 0.5s ease 1.25s forwards;
}
.feed .body {
  font-size:11px; color:rgba(250,250,247,0.55);
  line-height:1.9; margin-bottom:22px;
  opacity:0; animation:fadeUp 0.6s ease 1.4s forwards;
}
.feed .transfer-box {
  border-left:2px solid var(--accent);
  background:rgba(139,111,71,0.12);
  padding:12px 14px; margin-bottom:22px;
  opacity:0; animation:slideLeft 0.6s ease 1.65s forwards;
}
.feed .transfer-label {
  font-size:7px; letter-spacing:3px;
  color:var(--accent-light); text-transform:uppercase; margin-bottom:8px;
}
.feed .transfer-items { display:flex; flex-direction:column; gap:5px; }
.feed .transfer-item {
  font-size:11px; color:var(--warm-white); line-height:1.6;
  display:flex; align-items:center; gap:8px;
}
.feed .transfer-item::before {
  content:''; display:block; width:4px; height:4px;
  border-radius:50%; background:var(--accent-light); flex-shrink:0;
}
.feed .cta {
  font-size:8px; letter-spacing:4px;
  color:var(--warm-white); text-transform:uppercase;
  display:flex; align-items:center; gap:10px;
  opacity:0; animation:fadeUp 0.5s ease 2.0s forwards;
}
.feed .cta::after {
  content:''; display:block; width:20px; height:1px; background:var(--accent);
  transform:scaleX(0); transform-origin:left;
  animation:lineGrow 0.4s ease 2.2s forwards;
}
.feed .point-badge {
  position:absolute; bottom:24px; right:24px; z-index:3;
  background:var(--accent); padding:6px 12px;
  font-size:9px; letter-spacing:1px; color:var(--warm-white);
  opacity:0; animation:fadeIn 0.5s ease 2.2s forwards;
}
</style>
</head>
