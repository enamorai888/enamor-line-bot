<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR 採購平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f3f3f0;--border:#e2dedd;
  --green:#2d7a3a;--green-light:#f0f7f1;--green-border:#b7dfcc;
  --red:#c0392b;--red-light:#fef2f2;
  --orange:#e67e22;--orange-light:#fff8f0;
  --text:#1a1a1a;--muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}

header{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo-img{height:30px;width:auto}
.header-title{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px}
.spacer{flex:1}
.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;transition:all .3s}
.dot.ok{background:var(--green);box-shadow:0 0 5px rgba(45,122,58,.4)}
.dot.err{background:var(--red)}
.dot-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}

.wrap{max-width:1180px;margin:0 auto;padding:24px 28px}

/* TAB NAVIGATOR */
.tab-nav{display:flex;gap:0;margin-bottom:24px;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tab-btn{flex:1;padding:14px 12px;text-align:center;cursor:pointer;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--muted);transition:all .2s;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:var(--green-light);color:var(--green);font-weight:600}
.tab-btn .tab-num{width:20px;height:20px;border-radius:50%;background:var(--border);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace}
.tab-btn.active .tab-num{background:var(--green)}
.tab-btn.done .tab-num{background:var(--green)}
.tab-btn.done{color:var(--green)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* SHEET STATUS */
.sheet-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sheet-bar .lbl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.sheet-info{font-size:13px;font-family:'DM Mono',monospace;color:var(--muted)}
.sheet-info.ok{color:var(--green)}.sheet-info.err{color:var(--red)}
.btn-xs{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-xs:hover{border-color:var(--green);color:var(--green)}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;position:relative;max-width:520px;margin-bottom:20px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--green);background:var(--green-light)}
.upload-zone h2{font-size:15px;font-weight:500;margin-bottom:5px}
.upload-zone p{font-size:13px;color:var(--muted)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-ok{margin-top:8px;font-size:12px;color:var(--green);display:none}

/* PROGRESS */
.prog-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.prog-lbl{font-size:13px;color:var(--muted);margin-bottom:8px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .35s}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;margin-bottom:5px}
.card-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* MODE TOGGLE */
.mode-bar{background:var(--orange-light);border:1px solid #fde8c8;border-radius:8px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mode-bar label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}

/* VENDOR TABS */
.vtabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.vtab{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace}
.vtab:hover{border-color:var(--text);color:var(--text)}
.vtab.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}
.vtab .badge{display:inline-flex;align-items:center;justify-content:center;margin-left:4px;background:rgba(0,0,0,.1);border-radius:9px;padding:0 6px;font-size:10px}

/* VENDOR BLOCK */
.vendor-block{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.vendor-head{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.vbadge{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-weight:600}
.vendor-head h3{font-size:14px;font-weight:600}
.vtotal{margin-left:auto;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.btn-dl{padding:6px 14px;border-radius:5px;border:1px solid var(--green);background:#fff;color:var(--green);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.btn-dl:hover{background:var(--green);color:#fff}

table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border)}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f8}
tr.cancelled td{opacity:.35;text-decoration:line-through}
.qty-td{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;text-align:center;color:var(--green)}
.qty-sm{font-family:'DM Mono',monospace;font-size:12px;text-align:center;color:var(--muted)}
.qty-shopee{font-family:'DM Mono',monospace;font-size:12px;text-align:center;color:var(--orange)}
.code-td{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.color-td{font-size:13px}
.size-td{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:3px;display:inline-block;border:1px solid var(--border)}
.check-td{text-align:center}
.row-check{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}

/* STEP 2 SPECIAL */
.step2-info{background:var(--green-light);border:1px solid var(--green-border);border-radius:8px;padding:14px 18px;margin-bottom:18px;font-size:13px;color:var(--green)}
.cancelled-count{font-family:'DM Mono',monospace;font-weight:700;color:var(--red)}

/* EXPORT BAR */
.export-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px}
.export-info h3{font-size:13px;font-weight:600;margin-bottom:3px}
.export-info p{font-size:12px;color:var(--muted)}
.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{background:#333}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#256132}
.btn-secondary{background:#fff;color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text);color:var(--text)}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:500;font-size:14px;color:var(--muted);font-family:'DM Mono',monospace}
.qty-input:focus{outline:none;border-color:var(--green)!important;box-shadow:0 0 0 2px rgba(45,122,58,.15)}
.qty-input::-webkit-inner-spin-button{opacity:1}
#zone2{border-style:dashed;cursor:pointer}
#zone2:hover{border-color:var(--green);background:var(--green-light)}
</style>
</head>
<body>

<header>
  <img class="logo-img" src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" alt="EnamoR" onerror="this.style.display='none'">
  <span class="header-title">採購平台</span>
  <div class="spacer"></div>
  <div class="dot" id="dot"></div>
  <span class="dot-label" id="dotLabel">待上傳</span>
</header>

<div class="wrap">

  <!-- SUPPLIER BAR -->
  <div class="sheet-bar">
    <span class="lbl">供應商對照表</span>
    <span class="sheet-info" id="supplierInfo">讀取中...</span>
    <div class="spacer"></div>
    <button class="btn-xs" onclick="loadSupplierSheet()">↺ 重新載入</button>
  </div>

  <!-- TAB NAV -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tab1btn" onclick="switchTab(1)">
      <span class="tab-num" id="t1num">1</span>
      上傳採購建議報表
    </button>
    <button class="tab-btn" id="tab2btn" onclick="switchTab(2)">
      <span class="tab-num" id="t2num">2</span>
      廠商詢價 &amp; 確認
    </button>
    <button class="tab-btn" id="tab3btn" onclick="switchTab(3)">
      <span class="tab-num" id="t3num">3</span>
      下載正式採購單
    </button>
  </div>

  <!-- TAB 1: 上傳 + 詢價單 -->
  <div class="tab-panel active" id="tab1">
    <div class="upload-zone" id="zone1" onclick="document.getElementById('f1').click()">
      <input type="file" id="f1" accept=".xlsx,.xls" onchange="handleFile(this)">
      <div style="font-size:32px;margin-bottom:8px;opacity:.4">📊</div>
      <h2>採購建議報表</h2>
      <p>拖拽或點擊上傳 xlsx</p>
      <div class="file-ok" id="f1ok">✓ 已載入</div>
    </div>
    <div id="prog1" class="prog-wrap hidden">
      <div class="prog-lbl" id="prog1lbl">比對中...</div>
      <div class="prog-bar"><div class="prog-fill" id="prog1fill" style="width:0%"></div></div>
    </div>
    <div id="tab1result" class="hidden">
      <div class="mode-bar">
        <span style="font-weight:600;font-size:13px">庫存模式：</span>
        <label><input type="radio" name="stockMode" value="split" checked onchange="recomputeQty()"> 獨立庫存（建議採購量＋蝦皮欠貨）</label>
        <label><input type="radio" name="stockMode" value="merged" onchange="recomputeQty()"> 合倉模式（僅建議採購量）</label>
      </div>
      <div class="summary-grid" id="sum1"></div>
      <div class="vtabs" id="vtabs1"></div>
      <div id="tables1"></div>
      <div class="export-bar">
        <div class="export-info">
          <h3>詢價單（無品名）</h3>
          <p>發給廠商確認庫存，不含商品名稱與內部條碼</p>
        </div>
        <button class="btn btn-primary" onclick="exportInquiry()">⬇ 下載詢價單 Excel</button>
        <button class="btn btn-green" onclick="saveToSheetAndNext()">☁ 存入雲端 → 進入確認</button>
      </div>
    </div>
  </div>

  <!-- TAB 2: 廠商確認 -->
  <div class="tab-panel" id="tab2">
    <div id="tab2loading" class="prog-wrap">
      <div class="prog-lbl">從雲端讀取採購資料...</div>
      <div class="prog-bar"><div class="prog-fill" style="width:60%"></div></div>
    </div>
    <div id="tab2content" class="hidden">
      <div class="step2-info">
        上傳廠商回傳的 Excel（沒貨品項已刪除），系統自動比對並取消未回傳的品項。可分批上傳多個廠商檔案。
        <span style="margin-left:16px">已取消：<span class="cancelled-count" id="cancelledCount">0</span> 筆</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <div class="upload-zone" id="zone2" onclick="document.getElementById('f2').click()"
          style="padding:16px 24px;max-width:none;flex:1;min-width:280px;margin-bottom:0;display:flex;align-items:center;justify-content:center;gap:12px">
          <input type="file" id="f2" accept=".xlsx,.xls" onchange="handleVendorFile(this)" multiple>
          <span style="font-size:20px">📥</span>
          <div style="text-align:left">
            <div style="font-size:13px;font-weight:500">上傳廠商回傳 Excel</div>
            <div style="font-size:11px;color:var(--muted)">支援多檔同時上傳，自動識別廠商</div>
          </div>
        </div>
        <button class="btn btn-secondary" onclick="resetAllChecked()" style="white-space:nowrap">↺ 全部重設勾選</button>
      </div>
      <div id="vendorUploadLog" style="margin-bottom:12px"></div>
      <div class="vtabs" id="vtabs2"></div>
      <div id="tables2"></div>
    </div>
  </div>

  <!-- TAB 3: 正式採購單 -->
  <div class="tab-panel" id="tab3">
    <div id="tab3loading" class="prog-wrap">
      <div class="prog-lbl">從雲端讀取確認資料...</div>
      <div class="prog-bar"><div class="prog-fill" style="width:60%"></div></div>
    </div>
    <div id="tab3content" class="hidden">
      <div class="summary-grid" id="sum3"></div>
      <div class="vtabs" id="vtabs3"></div>
      <div id="tables3"></div>
      <div class="export-bar">
        <div class="export-info">
          <h3>正式採購單（含品名）</h3>
          <p>含商品條碼、商品名稱，供人工匯入 OMS</p>
        </div>
        <button class="btn btn-green" onclick="exportFinal()">⬇ 下載正式採購單</button>
        <button class="btn btn-secondary" onclick="switchTab(2)">← 返回修改</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPPLIER_SHEET_ID = '1jYnzBWyvF23asaPFjqYaEl5LXOg77inIaJlCMkzdOS8';
const SHEETS_API_KEY    = 'AIzaSyCrFGNy_-YgRWsrOw0H_tfTqeCbnIkVZA8';
const OPS_SCRIPT_URL    = 'https://script.google.com/macros/s/AKfycbwHIT8vlYU9qhj4yJM017czPLwRy4KfHdKfyBpdYkKAh4u3BHiGXjNCPpH3toLizQnu_A/exec';
const SKIP = new Set(['999999','Discount','SHIPFEE']);

let supplierMap = {};
let purchaseData = null;
let mergedData = [];   // Step1 產出
let cloudData  = [];   // Step2/3 從 Sheet 讀取
let currentFilter1 = 'all';
let currentFilter2 = 'all';
let currentFilter3 = 'all';

// ── DATE HELPERS ──────────────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr || dateStr === '0' || dateStr === '') return '—';
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '—';
    return (d.getMonth()+1)+'/'+(d.getDate());
  } catch(e) { return '—'; }
}
function isUrgent(dateStr) {
  if (!dateStr || dateStr === '0' || dateStr === '') return false;
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return false;
    const diff = (d - new Date()) / (1000*60*60*24);
    return diff >= 0 && diff <= 14;
  } catch(e) { return false; }
}

// ── SUPPLIER SHEET ─────────────────────────────────────────────────────
async function loadSupplierSheet() {
  const el = document.getElementById('supplierInfo');
  el.className = 'sheet-info'; el.textContent = '讀取中...';
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SUPPLIER_SHEET_ID}/values/A:G?key=${SHEETS_API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const rows = json.values || [];
    if (rows.length < 2) throw new Error('資料為空');
    const h = rows[0];
    const ci = n => h.indexOf(n);
    const iCode=ci('商品條碼'),iVid=ci('廠商編號'),iVname=ci('廠商名稱'),iVsku=ci('廠商貨號'),iSize=ci('尺寸說明'),iColor=ci('廠商顏色說明');
    if (iCode===-1||iVid===-1) throw new Error('欄位不符');
    supplierMap = {};
    rows.slice(1).forEach(r => {
      const code = (r[iCode]||'').trim();
      if (code && !supplierMap[code]) supplierMap[code] = {
        vendorId:(r[iVid]||'').trim(), vendorName:(r[iVname]||'').trim(),
        vendorSku:(r[iVsku]||'').trim(), vendorSize:(r[iSize]||'').trim(),
        vendorColor:(r[iColor]||'').trim(),
      };
    });
    const cnt = Object.keys(supplierMap).length;
    el.className='sheet-info ok'; el.textContent=`已載入 ${cnt} 筆`;
    document.getElementById('dot').className='dot ok';
    document.getElementById('dotLabel').textContent='對照表就緒';
  } catch(e) {
    el.className='sheet-info err'; el.textContent='載入失敗：'+e.message;
    document.getElementById('dot').className='dot err';
  }
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────
function switchTab(n) {
  [1,2,3].forEach(i => {
    document.getElementById('tab'+i).classList.toggle('active', i===n);
    document.getElementById('tab'+i+'btn').classList.toggle('active', i===n);
  });
  if (n===2) loadCloudData(2);
  if (n===3) {
    if (cloudData.length > 0) {
      document.getElementById('tab3loading').classList.add('hidden');
      document.getElementById('tab3content').classList.remove('hidden');
      renderTab3();
    } else {
      loadCloudData(3);
    }
  }
}

// ── FILE UPLOAD ────────────────────────────────────────────────────────
const z1 = document.getElementById('zone1');
z1.addEventListener('dragover', e=>{e.preventDefault();z1.classList.add('dragover')});
z1.addEventListener('dragleave', ()=>z1.classList.remove('dragover'));
z1.addEventListener('drop', e=>{e.preventDefault();z1.classList.remove('dragover');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0])});
function handleFile(input){if(input.files[0])processFile(input.files[0]);}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result,{type:'array'});
    purchaseData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    document.getElementById('f1ok').style.display='block';
    z1.style.borderColor='var(--green)';
    showToast('報表已載入 '+purchaseData.length+' 筆');
    processMerge();
  };
  reader.readAsArrayBuffer(file);
}

function getSplitMode() {
  return document.querySelector('input[name="stockMode"]:checked')?.value === 'split';
}

function processMerge() {
  if (!purchaseData || Object.keys(supplierMap).length===0) return;
  const pw=document.getElementById('prog1'),pf=document.getElementById('prog1fill'),pl=document.getElementById('prog1lbl');
  pw.classList.remove('hidden');
  document.getElementById('tab1result').classList.add('hidden');
  setTimeout(()=>{pf.style.width='40%';pl.textContent='篩選需採購項目...';},80);
  setTimeout(()=>{pf.style.width='75%';pl.textContent='比對供應商對照表...';},320);
  setTimeout(()=>{
    pf.style.width='100%'; pl.textContent='完成';
    const isSplit = getSplitMode();
    mergedData=[];
    purchaseData.forEach(row=>{
      const qty     = parseFloat(row['建議採購量'])||0;
      const shopeeQ = parseFloat(row['蝦皮欠貨量']||row['康德欠貨量'])||0;
      const availDays = parseFloat(String(row['可用天數']||'').replace(',',''))||0;
      const stockoutDate = String(row['預計缺貨日']||'').trim();
      const total   = isSplit ? qty+shopeeQ : qty;
      if(total<=0) return;
      const code = String(row['商品條碼']||'').trim();
      if(SKIP.has(code)) return;
      const s = supplierMap[code];
      if(!s||!s.vendorId) return;
      mergedData.push({
        barcode:code, productName:String(row['商品名稱']||''),
        vendorId:s.vendorId, vendorName:s.vendorName, vendorSku:s.vendorSku,
        vendorColor:s.vendorColor, vendorSize:s.vendorSize,
        qty:Math.ceil(qty), shopeeQty:Math.ceil(shopeeQ), totalQty:Math.max(10, Math.ceil(total)),
        availDays:availDays, stockoutDate:stockoutDate,
        checked:true,
      });
    });
    mergedData.sort((a,b)=>a.vendorId.localeCompare(b.vendorId)||String(a.vendorSku).localeCompare(String(b.vendorSku)));
    setTimeout(()=>{pw.classList.add('hidden');renderTab1();},300);
  },650);
}

function recomputeQty() {
  if(!mergedData.length) return;
  const isSplit = getSplitMode();
  mergedData.forEach(r => r.totalQty = isSplit ? r.qty+r.shopeeQty : r.qty);
  renderTab1();
}

// ── SHARED RENDER HELPERS ──────────────────────────────────────────────
function getVendors(data) {
  const seen={};
  data.forEach(r=>{if(!seen[r.vendorId])seen[r.vendorId]=r.vendorName;});
  return Object.entries(seen).map(([id,name])=>({id,name}));
}

function renderVtabs(elId, vendors, data, prefix, onFilter) {
  const el = document.getElementById(elId);
  el.innerHTML=`<div class="vtab active" onclick="(${onFilter.toString()})('all');setActiveVtab('${elId}',this)">全部<span class="badge">${data.length}</span></div>`;
  vendors.forEach(v=>{
    const cnt=data.filter(r=>r.vendorId===v.id).length;
    const t=document.createElement('div');
    t.className='vtab';
    t.innerHTML=`${v.id}<span class="badge">${cnt}</span>`;
    t.onclick=()=>{onFilter(v.id);setActiveVtab(elId,t);};
    el.appendChild(t);
  });
}

function setActiveVtab(elId, el) {
  document.querySelectorAll('#'+elId+' .vtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function renderVendorTables(areaId, data, filter, showCheck, showName=false) {
  const area=document.getElementById(areaId);
  const vendors = filter==='all' ? getVendors(data) : getVendors(data).filter(v=>v.id===filter);
  area.innerHTML='';
  vendors.forEach(v=>{
    const rows=data.filter(r=>r.vendorId===v.id);
    const activeRows=rows.filter(r=>r.checked);
    const total=activeRows.reduce((s,r)=>s+r.totalQty,0);
    const div=document.createElement('div');
    div.className='vendor-block';
    const isSplit = getSplitMode();

    let extraCols = showName
      ? `<th>商品條碼</th><th>商品名稱</th>`
      : ``;
    let checkCol = showCheck ? `<th style="width:40px;text-align:center">採購</th>` : '';
    let shopeeCol = isSplit ? `<th style="text-align:center">蝦皮欠貨</th>` : '';
    let finalHeader = showCheck
      ? `<th style="text-align:center;color:#666">系統建議</th><th style="text-align:center;font-weight:700;color:var(--green)">實際採購量</th>`
      : `<th style="text-align:center;color:#aaa;font-size:9px">系統建議</th><th style="text-align:center;font-weight:700">實際採購量</th>`;

    const activeTotal = activeRows.reduce((s,r)=>s+(r.finalQty!==undefined?r.finalQty:r.totalQty),0);
    div.innerHTML=`
      <div class="vendor-head">
        <span class="vbadge">${v.id}</span>
        <h3>${v.vendorName||v.id}</h3>
        <span class="vtotal">確認 ${activeRows.length}/${rows.length} 筆 · ${activeTotal} 件</span>
        ${!showCheck && !showName ? `<button class="btn-dl" onclick="exportVendorInquiry('${v.id}')">⬇ ${todayStr()}_${v.id}.xlsx</button>` : ''}
      </div>
      <table><thead><tr>
        ${checkCol}
        <th>廠商貨號</th><th>廠商顏色說明</th><th>尺寸</th>
        ${extraCols}
        <th style="text-align:center">建議採購量</th>
        ${shopeeCol}
        <th style="text-align:center">可用天數</th>
        <th style="text-align:center">預計缺貨日</th>
        ${finalHeader}
      </tr></thead>
      <tbody>${rows.map(r=>renderRow(r,showCheck,showName,isSplit)).join('')}</tbody></table>`;
    area.appendChild(div);
  });
}

function renderRow(r, showCheck, showName, isSplit) {
  const cls = r.checked ? '' : 'cancelled';
  const chk = showCheck
    ? `<td class="check-td"><input type="checkbox" class="row-check" ${r.checked?'checked':''} onchange="toggleRow('${r.barcode}','${r.vendorId}',this)"></td>`
    : '';
  const nameCols = showName
    ? `<td class="code-td">${r.barcode}</td><td style="font-size:12px">${r.productName}</td>`
    : '';
  const shopeeCol = isSplit
    ? `<td class="qty-shopee">${r.shopeeQty||0}</td>`
    : '';
  // Tab2: 可編輯數量; Tab3/其他: 顯示 finalQty
  const finalQty = r.finalQty !== undefined ? r.finalQty : r.totalQty;
  const qtyCell = showCheck
    ? `<td class="qty-td" style="padding:4px 8px">
        <input type="number" class="qty-input" 
          value="${finalQty}" min="1"
          style="width:64px;text-align:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--green);border:1px solid var(--border);border-radius:5px;padding:3px 6px;background:#fff"
          onchange="updateQty('${r.barcode}','${r.vendorId}',this.value)"
          onclick="this.select()">
       </td>`
    : `<td class="qty-td">${finalQty}</td>`;
  return `<tr class="${cls}">
    ${chk}
    <td class="code-td">${r.vendorSku}</td>
    <td class="color-td">${r.vendorColor}</td>
    <td><span class="size-td">${r.vendorSize}</span></td>
    ${nameCols}
    <td class="qty-sm">${r.qty}</td>
    ${shopeeCol}
    <td class="qty-sm" style="color:${(r.availDays||0)<7&&(r.availDays||0)>0?'var(--red)':'var(--muted)'}">${r.availDays||0}</td>
    <td style="font-size:11px;font-family:'DM Mono',monospace;text-align:center;color:${isUrgent(r.stockoutDate)?'var(--red)':'var(--muted)'};white-space:nowrap">${formatDate(r.stockoutDate)}</td>
    <td class="qty-sm" style="color:#aaa">${r.totalQty}</td>
    ${qtyCell}
  </tr>`;
}

// ── VENDOR FILE UPLOAD (Tab2) ─────────────────────────────────────────
function handleVendorFile(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  let processed = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) { showToast('檔案無資料：'+file.name); return; }

      // 建立廠商回傳的 key set: 廠商貨號_顏色_尺寸
      const vendorSet = new Set();
      const vendorQtyMap = {};
      rows.forEach(r => {
        const key = String(r['廠商貨號']||'').trim()+'_'+String(r['廠商顏色說明']||'').trim()+'_'+String(r['尺寸說明']||'').trim();
        vendorSet.add(key);
        vendorQtyMap[key] = parseInt(r['應採購量'])||0;
      });

      // 找出這個廠商的 cloudData 項目
      // 先從檔名猜廠商 ID（格式 YYYYMMDD_CH01.xlsx）
      const nameParts = file.name.replace('.xlsx','').replace('.xls','').split('_');
      const guessedVendorId = nameParts.length >= 2 ? nameParts[nameParts.length-1] : null;

      let matched = 0, cancelled = 0, updated = 0;
      cloudData.forEach(r => {
        if (guessedVendorId && r.vendorId !== guessedVendorId) return;
        const key = String(r.vendorSku||'').trim()+'_'+String(r.vendorColor||'').trim()+'_'+String(r.vendorSize||'').trim();
        if (vendorSet.has(key)) {
          r.checked = true;
          matched++;
          // 帶入廠商回傳數量
          const vqty = vendorQtyMap[key];
          if (vqty > 0) { r.finalQty = vqty; updated++; }
        } else {
          r.checked = false;
          cancelled++;
        }
      });

      // sync cancelled to sheet
      cloudData.filter(r => guessedVendorId ? r.vendorId===guessedVendorId : true).forEach(r => {
        fetch(OPS_SCRIPT_URL, {
          method:'POST', mode:'no-cors',
          body: JSON.stringify({action:'toggle', barcode:r.barcode, vendorId:r.vendorId, checked:r.checked}),
          headers:{'Content-Type':'application/json'}
        }).catch(()=>{});
      });

      // log
      const log = document.getElementById('vendorUploadLog');
      const chip = document.createElement('div');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:var(--green-light);border:1px solid var(--green-border);border-radius:6px;padding:5px 12px;font-size:12px;margin:3px;font-family:"DM Mono",monospace';
      chip.innerHTML = `✓ <strong>${guessedVendorId||file.name}</strong> 比對完成：${matched} 筆確認 · <span style="color:var(--red)">${cancelled} 筆取消</span> · ${updated} 筆數量更新`;
      log.appendChild(chip);

      processed++;
      updateCancelledCount();
      renderVendorTables('tables2', cloudData, currentFilter2, true);
      showToast(`${guessedVendorId||file.name}：${matched} 確認，${cancelled} 取消`);
    };
    reader.readAsArrayBuffer(file);
  });
  input.value = '';
}

function resetAllChecked() {
  cloudData.forEach(r => { r.checked = true; delete r.finalQty; });
  updateCancelledCount();
  renderVendorTables('tables2', cloudData, currentFilter2, true);
  document.getElementById('vendorUploadLog').innerHTML = '';
  showToast('已全部重設為勾選');
}

// ── TOGGLE ROW ────────────────────────────────────────────────────────
async function toggleRow(barcode, vendorId, checkbox) {
  const checked = checkbox.checked;
  // update local
  const item = cloudData.find(r=>r.barcode===barcode&&r.vendorId===vendorId);
  if (item) item.checked = checked;
  // update sheet
  try {
    await fetch(OPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({action:'toggle', barcode, vendorId, checked}),
      headers:{'Content-Type':'application/json'}
    });
  } catch(e) {}
  updateCancelledCount();
  renderVendorTables('tables2', cloudData, currentFilter2, true);
}

function updateQty(barcode, vendorId, val) {
  const qty = parseInt(val) || 1;
  const item = cloudData.find(r=>r.barcode===barcode&&r.vendorId===vendorId);
  if (item) item.finalQty = qty;
  // sync to sheet
  try {
    fetch(OPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({action:'updateQty', barcode, vendorId, finalQty: qty}),
      headers:{'Content-Type':'application/json'}
    });
  } catch(e){}
  updateTotals();
}

function updateTotals() {
  // re-render summary cards for tab3 if visible
  const active = cloudData.filter(r=>r.checked);
  const vendors = getVendors(active);
  const totalQty = active.reduce((s,r)=>s+(r.finalQty!==undefined?r.finalQty:r.totalQty),0);
  const sum3 = document.getElementById('sum3');
  if (sum3 && sum3.closest('#tab3').classList.contains('active')) {
    sum3.innerHTML=`
      <div class="card"><div class="card-lbl">確認採購廠商</div><div class="card-val">${vendors.length}</div></div>
      <div class="card"><div class="card-lbl">確認採購 SKU</div><div class="card-val">${active.length}</div></div>
      <div class="card"><div class="card-lbl">合計採購量</div><div class="card-val">${totalQty}</div></div>
      <div class="card"><div class="card-lbl">取消項目</div><div class="card-val" style="color:var(--red)">${cloudData.length-active.length}</div><div class="card-sub">廠商斷貨</div></div>`;
  }
}

function updateCancelledCount() {
  const cancelled = cloudData.filter(r=>!r.checked).length;
  const el = document.getElementById('cancelledCount');
  if (el) el.textContent = cancelled;
}

// ── CLOUD OPS ─────────────────────────────────────────────────────────
async function saveToSheetAndNext() {
  showLoading('存入雲端中...');
  const batchId = todayStr();
  const rows = mergedData.map(r=>({...r, batchId}));
  try {
    await fetch(OPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({action:'init', rows}),
      headers:{'Content-Type':'application/json'}
    });
    hideLoading();
    showToast('✓ 已存入雲端');
    markTabDone(1);
    switchTab(2);
  } catch(e) {
    hideLoading();
    showToast('存入失敗：'+e.message);
  }
}

async function loadCloudData(tabNum) {
  const loadEl = document.getElementById('tab'+tabNum+'loading');
  const contentEl = document.getElementById('tab'+tabNum+'content');
  if (loadEl) loadEl.classList.remove('hidden');
  if (contentEl) contentEl.classList.add('hidden');
  try {
    const res = await fetch(OPS_SCRIPT_URL+'?action=read');
    const json = await res.json();
    if (json.result && Array.isArray(json.data)) {
      cloudData = json.data.map(r=>({
        ...r,
        checked: false,  // 預設全部未勾選，等廠商回傳檔上傳後才勾選
        availDays: parseFloat(String(r.availDays||'').replace(',',''))||0,
        stockoutDate: String(r.stockoutDate||''),
      }));
      if (tabNum===2) renderTab2();
      if (tabNum===3) renderTab3();
    } else {
      if (loadEl) loadEl.classList.add('hidden');
      showToast('雲端無資料，請先完成步驟一');
    }
  } catch(e) {
    if (loadEl) loadEl.classList.add('hidden');
    showToast('讀取失敗：'+e.message);
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10).replace(/-/g,'');}
