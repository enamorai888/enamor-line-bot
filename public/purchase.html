<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR 採購單產生平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f3f3f0;--border:#e2dedd;
  --green:#2d7a3a;--green-light:#f0f7f1;--red:#c0392b;
  --text:#1a1a1a;--muted:#888;--accent:#1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}

header{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo-img{height:30px;width:auto}
.header-title{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px}
.spacer{flex:1}
.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;transition:all .3s}
.dot.ok{background:var(--green);box-shadow:0 0 5px rgba(45,122,58,.4)}
.dot.err{background:var(--red)}
.dot-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}

.wrap{max-width:1180px;margin:0 auto;padding:24px 28px}

/* SHEET STATUS */
.sheet-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sheet-bar .lbl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.sheet-info{font-size:13px;font-family:'DM Mono',monospace;color:var(--muted)}
.sheet-info.ok{color:var(--green)}.sheet-info.err{color:var(--red)}
.btn-xs{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-xs:hover{border-color:var(--green);color:var(--green)}

/* STEPS */
.steps{display:flex;margin-bottom:20px}
.step{flex:1;padding:9px 12px;background:#fff;border:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace}
.step:first-child{border-radius:6px 0 0 6px}.step:last-child{border-radius:0 6px 6px 0}.step+.step{border-left:none}
.step.active{background:var(--green-light);border-color:var(--green);color:var(--green)}
.step.done{background:var(--green-light);border-color:var(--green);color:var(--green)}
.sn{width:18px;height:18px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
.step.active .sn,.step.done .sn{background:var(--green)}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;position:relative;max-width:520px;margin-bottom:20px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--green);background:var(--green-light)}
.upload-zone h2{font-size:15px;font-weight:500;margin-bottom:5px}
.upload-zone p{font-size:13px;color:var(--muted)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-ok{margin-top:8px;font-size:12px;color:var(--green);display:none}

/* PROGRESS */
.prog-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.prog-lbl{font-size:13px;color:var(--muted);margin-bottom:8px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .35s}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;margin-bottom:5px}
.card-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* VENDOR TABS */
.vtabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.vtab{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace}
.vtab:hover{border-color:var(--text);color:var(--text)}
.vtab.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}
.vtab .badge{display:inline-flex;align-items:center;justify-content:center;margin-left:4px;background:rgba(255,255,255,.2);border-radius:9px;padding:0 6px;font-size:10px}
.vtab:not(.active) .badge{background:rgba(0,0,0,.07);color:var(--muted)}

/* VENDOR BLOCK */
.vendor-block{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.vendor-head{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.vbadge{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;background:#f3f3f0;border:1px solid var(--border);color:var(--text);font-weight:600}
.vendor-head h3{font-size:14px;font-weight:600}
.vtotal{margin-left:auto;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.btn-dl{padding:6px 14px;border-radius:5px;border:1px solid var(--green);background:#fff;color:var(--green);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.btn-dl:hover{background:var(--green);color:#fff}

table{width:100%;border-collapse:collapse}
th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border)}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf9}
.qty-td{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;text-align:center;color:var(--green)}
.code-td{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.color-td{font-size:13px}
.size-td{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:3px;display:inline-block;border:1px solid var(--border)}

/* GLOBAL EXPORT */
.export-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:4px}
.export-info h3{font-size:13px;font-weight:600;margin-bottom:3px}
.export-info p{font-size:12px;color:var(--muted)}
.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:7px}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{background:#333}
.btn-secondary{background:#fff;color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text);color:var(--text)}

.hidden{display:none!important}
.note{background:#fff8f0;border-left:3px solid #e67e22;border-radius:0 6px 6px 0;padding:10px 14px;margin-bottom:18px;font-size:12px;color:var(--muted)}
.note strong{color:#e67e22}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:640px){.wrap{padding:16px}.export-bar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<header>
  <img class="logo-img" src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" alt="EnamoR" onerror="this.style.display='none'">
  <span class="header-title">採購單產生平台</span>
  <div class="spacer"></div>
  <div class="dot" id="dot"></div>
  <span class="dot-label" id="dotLabel">待上傳</span>
</header>

<div class="wrap">

  <!-- SHEET STATUS -->
  <div class="sheet-bar">
    <span class="lbl">供應商對照表</span>
    <span class="sheet-info loading" id="sheetInfo">讀取中...</span>
    <div class="spacer"></div>
    <button class="btn-xs" onclick="loadSupplierSheet()">↺ 重新載入</button>
  </div>

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="step1"><div class="sn">1</div>上傳採購建議報表</div>
    <div class="step" id="step2"><div class="sn">2</div>比對 &amp; 預覽</div>
    <div class="step" id="step3"><div class="sn">3</div>匯出各供應商報表</div>
  </div>

  <!-- UPLOAD -->
  <div id="uploadArea">
    <div class="upload-zone" id="zone1" onclick="document.getElementById('f1').click()">
      <input type="file" id="f1" accept=".xlsx,.xls" onchange="handleFile(this)">
      <div style="font-size:32px;margin-bottom:8px;opacity:.4">📊</div>
      <h2>採購建議報表</h2>
      <p>拖拽或點擊上傳 xlsx</p>
      <div class="file-ok" id="f1ok">✓ 已載入</div>
    </div>
    <div id="progWrap" class="prog-wrap hidden">
      <div class="prog-lbl" id="progLbl">比對中...</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultArea" class="hidden">
    <div class="note"><strong>提醒：</strong>999999 / Discount / SHIPFEE 等系統條碼已自動排除。建議採購量已無條件進位為整數。</div>
    <div class="summary-grid" id="summaryCards"></div>
    <div class="vtabs" id="vtabs"></div>
    <div id="tablesArea"></div>
    <div class="export-bar">
      <div class="export-info">
        <h3>匯出全部供應商</h3>
        <p>所有供應商整合在一個 Excel，每廠商獨立分頁</p>
      </div>
      <button class="btn btn-primary" onclick="exportAll()">⬇ 匯出全部 Excel</button>
      <button class="btn btn-secondary" onclick="resetAll()">↺ 重新上傳</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1jYnzBWyvF23asaPFjqYaEl5LXOg77inIaJlCMkzdOS8';
const API_KEY  = 'AIzaSyCrFGNy_-YgRWsrOw0H_tfTqeCbnIkVZA8';

let supplierMap = {};
let purchaseData = null;
let mergedData = [];
let currentFilter = 'all';
const SKIP = new Set(['999999','Discount','SHIPFEE']);

// ── LOAD SUPPLIER FROM GOOGLE SHEET ──
async function loadSupplierSheet() {
  const el = document.getElementById('sheetInfo');
  el.className = 'sheet-info loading';
  el.textContent = '讀取中...';
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:G?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const rows = json.values || [];
    if (rows.length < 2) throw new Error('資料為空');
    const header = rows[0];
    // find column indices by name
    const ci = name => header.indexOf(name);
    const iCode  = ci('商品條碼');
    const iVid   = ci('廠商編號');
    const iVname = ci('廠商名稱');
    const iVsku  = ci('廠商貨號');
    const iSize  = ci('尺寸說明');
    const iColor = ci('廠商顏色說明');
    if (iCode === -1 || iVid === -1) throw new Error('欄位不符，請確認 Sheet 第一列標題');
    supplierMap = {};
    rows.slice(1).forEach(r => {
      const code = (r[iCode] || '').trim();
      if (code && !supplierMap[code]) {
        supplierMap[code] = {
          vendorId:    (r[iVid]   || '').trim(),
          vendorName:  (r[iVname] || '').trim(),
          vendorSku:   (r[iVsku]  || '').trim(),
          vendorSize:  (r[iSize]  || '').trim(),
          vendorColor: (r[iColor] || '').trim(),
        };
      }
    });
    const cnt = Object.keys(supplierMap).length;
    el.className = 'sheet-info ok';
    el.textContent = `已載入 ${cnt} 筆`;
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('dotLabel').textContent = '對照表就緒';
    showToast(`✓ 供應商對照表載入 ${cnt} 筆`);
    if (purchaseData) processMerge();
  } catch(e) {
    el.className = 'sheet-info err';
    el.textContent = '載入失敗：' + e.message;
    document.getElementById('dot').className = 'dot err';
  }
}

// ── DRAG DROP ──
const z1 = document.getElementById('zone1');
z1.addEventListener('dragover', e => { e.preventDefault(); z1.classList.add('dragover'); });
z1.addEventListener('dragleave', () => z1.classList.remove('dragover'));
z1.addEventListener('drop', e => { e.preventDefault(); z1.classList.remove('dragover'); if(e.dataTransfer.files[0]) processPurchaseFile(e.dataTransfer.files[0]); });
function handleFile(input) { if(input.files[0]) processPurchaseFile(input.files[0]); }

function processPurchaseFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type:'array' });
    purchaseData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
    document.getElementById('f1ok').style.display = 'block';
    z1.style.borderColor = 'var(--green)';
    setStep(1,'done'); setStep(2,'active');
    showToast('採購報表已載入 ' + purchaseData.length + ' 筆');
    processMerge();
  };
  reader.readAsArrayBuffer(file);
}

function processMerge() {
  if (!purchaseData || Object.keys(supplierMap).length === 0) return;
  const pw = document.getElementById('progWrap');
  const pf = document.getElementById('progFill');
  const pl = document.getElementById('progLbl');
  pw.classList.remove('hidden');
  document.getElementById('resultArea').classList.add('hidden');
  setTimeout(() => { pf.style.width='40%'; pl.textContent='篩選需採購項目...'; }, 80);
  setTimeout(() => { pf.style.width='75%'; pl.textContent='比對供應商對照表...'; }, 320);
  setTimeout(() => {
    pf.style.width='100%'; pl.textContent='完成';
    mergedData = [];
    purchaseData.forEach(row => {
      const qty = parseFloat(row['建議採購量']) || 0;
      if (qty <= 0) return;
      const code = String(row['商品條碼'] || '').trim();
      if (SKIP.has(code)) return;
      const s = supplierMap[code];
      if (!s || !s.vendorId) return;
      mergedData.push({
        vendorId:    s.vendorId,
        vendorName:  s.vendorName,
        vendorSku:   s.vendorSku,
        vendorSize:  s.vendorSize,
        vendorColor: s.vendorColor,
        barcode:     code,
        productName: String(row['商品名稱'] || ''),
        qty:         Math.ceil(qty),
      });
    });
    mergedData.sort((a,b) => a.vendorId.localeCompare(b.vendorId) || String(a.vendorSku).localeCompare(String(b.vendorSku)));
    setTimeout(() => {
      pw.classList.add('hidden');
      renderResults();
      setStep(2,'done'); setStep(3,'active');
    }, 300);
  }, 650);
}

function getVendors() {
  const seen = {};
  mergedData.forEach(r => { if(!seen[r.vendorId]) seen[r.vendorId]=r.vendorName; });
  return Object.entries(seen).map(([id,name]) => ({id,name}));
}

function renderResults() {
  document.getElementById('resultArea').classList.remove('hidden');
  const vendors = getVendors();
  const totalQty = mergedData.reduce((s,r) => s+r.qty, 0);
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="card-lbl">供應商數</div><div class="card-val">${vendors.length}</div><div class="card-sub">本次涉及廠商</div></div>
    <div class="card"><div class="card-lbl">採購 SKU</div><div class="card-val">${mergedData.length}</div><div class="card-sub">獨立品號</div></div>
    <div class="card"><div class="card-lbl">合計採購量</div><div class="card-val">${totalQty}</div><div class="card-sub">件（已進位）</div></div>`;
  // tabs
  const tabs = document.getElementById('vtabs');
  tabs.innerHTML = `<div class="vtab active" onclick="filterV('all',this)">全部<span class="badge">${mergedData.length}</span></div>`;
  vendors.forEach(v => {
    const cnt = mergedData.filter(r=>r.vendorId===v.id).length;
    const t = document.createElement('div');
    t.className='vtab'; t.innerHTML=`${v.id}<span class="badge">${cnt}</span>`;
    t.onclick = () => filterV(v.id, t);
    tabs.appendChild(t);
  });
  currentFilter = 'all';
  renderTables();
}

function filterV(vid, el) {
  currentFilter = vid;
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTables();
}

function todayStr() {
  return new Date().toISOString().slice(0,10).replace(/-/g,'');
}

function renderTables() {
  const area = document.getElementById('tablesArea');
  const vendors = currentFilter==='all' ? getVendors() : getVendors().filter(v=>v.id===currentFilter);
  area.innerHTML = '';
  vendors.forEach(v => {
    const rows = mergedData.filter(r=>r.vendorId===v.id);
    const total = rows.reduce((s,r)=>s+r.qty,0);
    const fname = `${todayStr()}_${v.id}.xlsx`;
    const div = document.createElement('div');
    div.className = 'vendor-block';
    div.innerHTML = `
      <div class="vendor-head">
        <span class="vbadge">${v.id}</span>
        <h3>${v.name||v.id}</h3>
        <span class="vtotal">合計 ${total} 件 | ${rows.length} SKU</span>
        <button class="btn-dl" onclick="exportVendor('${v.id}','${v.name||v.id}')">⬇ ${fname}</button>
      </div>
      <table>
        <thead><tr>
          <th>廠商貨號</th><th>廠商顏色說明</th><th>尺寸</th><th>商品條碼</th><th>商品名稱</th><th style="text-align:center">建議採購量</th>
        </tr></thead>
        <tbody>${rows.map(r=>`
          <tr>
            <td class="code-td">${r.vendorSku}</td>
            <td class="color-td">${r.vendorColor}</td>
            <td><span class="size-td">${r.vendorSize}</span></td>
            <td class="code-td">${r.barcode}</td>
            <td style="font-size:12px">${r.productName}</td>
            <td class="qty-td">${r.qty}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    area.appendChild(div);
  });
}

function buildVendorSheet(rows, vendorId, vendorName) {
  const wb = XLSX.utils.book_new();
  const data = [['廠商貨號','廠商顏色說明','尺寸說明','商品條碼','商品名稱','建議採購數量','備註']];
  rows.forEach(r => data.push([r.vendorSku, r.vendorColor, r.vendorSize, r.barcode, r.productName, r.qty, '']));
  data.push(['','','','','合計', rows.reduce((s,r)=>s+r.qty,0), '']);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), vendorId);
  return wb;
}

function exportVendor(vid, vname) {
  const rows = mergedData.filter(r=>r.vendorId===vid);
  const wb = buildVendorSheet(rows, vid, vname);
  XLSX.writeFile(wb, `${todayStr()}_${vid}.xlsx`);
  showToast(`✓ ${vid} 已匯出`);
}

function exportAll() {
  const wb = XLSX.utils.book_new();
  // summary sheet
  const sum = [['廠商編號','廠商名稱','廠商貨號','廠商顏色說明','尺寸說明','商品條碼','商品名稱','建議採購數量']];
  mergedData.forEach(r => sum.push([r.vendorId,r.vendorName,r.vendorSku,r.vendorColor,r.vendorSize,r.barcode,r.productName,r.qty]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sum), '總採購彙整');
  // per vendor
  getVendors().forEach(v => {
    const rows = mergedData.filter(r=>r.vendorId===v.id);
    const data = [['廠商貨號','廠商顏色說明','尺寸說明','商品條碼','商品名稱','建議採購數量','備註']];
    rows.forEach(r => data.push([r.vendorSku,r.vendorColor,r.vendorSize,r.barcode,r.productName,r.qty,'']));
    data.push(['','','','','合計',rows.reduce((s,r)=>s+r.qty,0),'']);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), v.id);
  });
  XLSX.writeFile(wb, `${todayStr()}_EnamoR_採購報表.xlsx`);
  showToast('✓ 全部匯出完成');
  setStep(3,'done');
}

function resetAll() {
  purchaseData = null; mergedData = [];
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('f1ok').style.display = 'none';
  document.getElementById('zone1').style.borderColor = '';
  document.getElementById('f1').value = '';
  setStep(1,'active'); setStep(2,''); setStep(3,'');
  currentFilter = 'all';
}

function setStep(n, state) {
  const el = document.getElementById('step'+n);
  el.className = 'step' + (state ? ' '+state : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// init
loadSupplierSheet();
</script>
