<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR 採購平台（OMS）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f7f7f5;--surface:#fff;--surface2:#f3f3f0;--border:#e2dedd;--green:#2d7a3a;--green-light:#f0f7f1;--green-border:#b7dfcc;--red:#c0392b;--red-light:#fef2f2;--red-border:#fecaca;--orange:#e67e22;--orange-light:#fff8f0;--blue:#2980b9;--blue-light:#ebf3fa;--text:#1a1a1a;--muted:#888;--muted2:#bbb;--newcol-bg:rgba(250,236,231,.4);--newcol-head:#FAECE7;--newcol-text:#993C1D}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
header{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}.logo-img{height:30px}.header-title{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px}.spacer{flex:1}.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;transition:all .3s}.dot.ok{background:var(--green);box-shadow:0 0 5px rgba(45,122,58,.4)}.dot.err{background:var(--red)}.dot-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.wrap{max-width:1280px;margin:0 auto;padding:24px 28px}
/* Tab styles */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 22px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:600;color:var(--muted);background:transparent;border:none;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab .badge{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--muted);font-weight:600}
.tab.active .badge{background:var(--text);color:#fff}
.tab-pane{display:none}
.tab-pane.active{display:block}
.status-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.sb-item{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}.sb-item .dot{width:6px;height:6px}.sb-item.ok{color:var(--green)}.sb-item.ok .dot{background:var(--green)}
.action-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap}.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#333}.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#256132}.btn-secondary{background:#fff;color:var(--muted);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--text);color:var(--text)}.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2471a3}.btn:disabled{opacity:.4;cursor:not-allowed}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px}.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;margin-bottom:5px}.card-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}.card-sub{font-size:11px;color:var(--muted);margin-top:2px}.card-alert{border-color:var(--red-border);background:var(--red-light)}.card-alert .card-val{color:var(--red)}
.vendor-config{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden}.vc-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}.vc-header h3{font-size:13px;font-weight:600}.vc-toggle{font-size:10px;color:var(--muted2);margin-left:auto}.vc-body{padding:0;max-height:0;overflow:hidden;transition:max-height .3s}.vc-body.open{max-height:800px;padding:12px 16px;overflow-y:auto}.vc-table{width:100%;border-collapse:collapse}.vc-table th{padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border)}.vc-table td{padding:6px 10px;font-size:12px;border-bottom:1px solid var(--surface2)}.vc-input{width:60px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:3px 6px;background:#fff;color:var(--text)}.vc-input:focus{outline:none;border-color:var(--green)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.filter-lbl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px}.chip{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;white-space:nowrap}.chip:hover{border-color:var(--text);color:var(--text)}.chip.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}.chip.alert{border-color:var(--red);color:var(--red)}.chip.alert.active{background:var(--red);color:#fff}.search-input{margin-left:auto;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-family:'DM Mono',monospace;color:var(--text);outline:none;width:200px}.search-input:focus{border-color:var(--text)}
.vendor-block{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}.vendor-head{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}.vbadge{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-weight:600}.vendor-head h3{font-size:14px;font-weight:600}.vtotal{margin-left:auto;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}.btn-dl{padding:6px 14px;border-radius:5px;border:1px solid var(--green);background:#fff;color:var(--green);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}.btn-dl:hover{background:var(--green);color:#fff}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1100px}th{padding:8px 8px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);vertical-align:middle}td{padding:9px 8px;font-size:13px;border-bottom:1px solid var(--surface2);vertical-align:middle}tr:last-child td{border-bottom:none}tr:hover td{background:#faf9f8}
th.newcol{background:var(--newcol-head);color:var(--newcol-text)}
td.newcol{background:var(--newcol-bg)}
tr.alert-row td{background:#fee2e2!important}
tr.alert-row td.newcol{background:#fecaca!important}
tr.urgent-row td{background:#fecaca!important;border-top:1px solid #f87171}
tr.urgent-row td.newcol{background:#fca5a5!important}
tr.urgent-row td:first-child{border-left:3px solid var(--red);padding-left:6px}
.mono{font-family:'DM Mono',monospace}.text-center{text-align:center}.text-right{text-align:right}.size-tag{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:3px;border:1px solid var(--border);display:inline-block}
.cell-stack{line-height:1.3}.cell-stack .sub{font-size:10px;color:var(--muted);font-weight:400}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px}.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}.hidden{display:none!important}
.meta-cell{cursor:pointer;min-width:130px}.meta-display{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);padding:2px 0}.meta-display.empty{color:var(--muted2)}.meta-display:hover{color:var(--text);text-decoration:underline dotted}.meta-input{width:100%;font-family:'DM Mono',monospace;font-size:11px;border:1px solid var(--green);border-radius:4px;padding:3px 6px;background:#fff;color:var(--text);outline:none;display:none}.meta-saving{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace}
.sku-note-cell{cursor:pointer;min-width:100px}.sku-note-display{font-size:11px;color:var(--muted);padding:2px 0}.sku-note-display.empty{color:var(--muted2)}.sku-note-display:hover{color:var(--text);text-decoration:underline dotted}.sku-note-input{width:100%;font-family:'DM Mono',monospace;font-size:11px;border:1px solid var(--blue);border-radius:4px;padding:3px 6px;background:#fff;color:var(--text);outline:none;display:none}
.receive-wrap{background:#fffbf4;border-top:2px solid var(--orange);padding:16px 20px}
.receive-title{font-size:12px;font-weight:600;color:var(--orange);font-family:'DM Mono',monospace;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.receive-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px;min-width:800px}
.receive-table th{padding:6px 10px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left}
.receive-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--surface2);vertical-align:middle}
.receive-table tr:last-child td{border-bottom:none}
.qty-input{width:70px;text-align:right;padding:4px 7px;font-family:'DM Mono',monospace;font-size:12px;border:1px solid var(--border);border-radius:4px;outline:none}
.qty-input:focus{border-color:var(--green)}
.qty-input.diff-ok{background:var(--green-light);border-color:var(--green-border);color:var(--green);font-weight:600}
.qty-input.diff-short{background:var(--red-light);border-color:var(--red-border);color:var(--red);font-weight:600}
.qty-input.diff-over{background:var(--blue-light);border-color:var(--blue);color:var(--blue);font-weight:600}
.diff-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-family:'DM Mono',monospace;font-weight:600}
.diff-tag.ok{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.diff-tag.short{background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.diff-tag.over{background:var(--blue-light);color:var(--blue);border:1px solid #90caf9}
.receive-note-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;font-family:'Noto Sans TC',sans-serif;font-size:13px;resize:vertical;outline:none;min-height:52px}
.receive-note-input:focus{border-color:var(--orange)}
.receive-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.rs-card{background:#fff;border:1px solid var(--border);border-radius:5px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;text-align:center}
.rs-card .rs-val{font-size:16px;font-weight:700}
.rs-card.alert{border-color:var(--red-border);background:var(--red-light)}.rs-card.alert .rs-val{color:var(--red)}
.rs-card.ok{border-color:var(--green-border);background:var(--green-light)}.rs-card.ok .rs-val{color:var(--green)}
.po-note-row{background:#f9f9f7}
.po-note-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;background:#fff}
.po-note-input:focus{border-color:var(--green)}
</style>
</head>
<body>
<div id="authWall" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;max-width:360px;width:90%">
    <img src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" style="height:28px;margin-bottom:20px" onerror="this.style.display='none'">
    <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:16px">採購平台 · OMS</div>
    <input type="password" id="authPw" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')authCheck()" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;outline:none;margin-bottom:12px">
    <button onclick="authCheck()" style="width:100%;padding:10px;border:none;border-radius:6px;background:var(--text);color:#fff;font-family:'DM Mono',monospace;font-size:13px;font-weight:600;cursor:pointer">進入</button>
    <div id="authErr" style="color:var(--red);font-size:12px;margin-top:10px;display:none">密碼錯誤</div>
  </div>
</div>
<script>
function authCheck(){
  if(document.getElementById('authPw').value==='28447208'){
    document.getElementById('authWall').style.display='none';
    sessionStorage.setItem('enamor_auth','1');
  }else{document.getElementById('authErr').style.display='block'}
}
if(sessionStorage.getItem('enamor_auth')==='1')document.getElementById('authWall').style.display='none';
</script>
<header>
  <img class="logo-img" src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" alt="EnamoR" onerror="this.style.display='none'">
  <span class="header-title">採購平台 · OMS</span>
  <div class="spacer"></div>
  <div class="dot" id="dot"></div>
  <span class="dot-label" id="dotLabel">待連線</span>
</header>
<div class="wrap">

  <!-- ============ Tabs ============ -->
  <div class="tabs">
    <button class="tab active" id="tabA" onclick="switchTab('A')">🛒 採購建議</button>
    <button class="tab" id="tabB" onclick="switchTab('B')">📋 採購單管理</button>
  </div>

  <!-- ============ by day 採購單查詢（兩個 Tab 共用） ============ -->
  <div id="historyBlock" style="background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden">
    <div id="historyHeader" style="padding:12px 18px;background:#f9fafb;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;border-bottom:1px solid var(--border)" onclick="toggleHistoryBlock()">
      <h3 style="font-size:13px;font-weight:600">📅 by day 採購單查詢</h3>
      <span style="font-size:11px;color:var(--muted)">跨廠商，按日期排序</span>
      <span style="margin-left:auto;font-size:11px;color:var(--muted2)" id="historyToggle">▶ 展開</span>
    </div>
    <div id="historyBody" style="display:none;padding:16px 18px">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px">
        <div>
          <label style="display:block;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">開始日期</label>
          <input type="date" id="historyStartDate" style="padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:12px">
        </div>
        <div>
          <label style="display:block;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">結束日期</label>
          <input type="date" id="historyEndDate" style="padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:12px">
        </div>
        <button class="btn btn-primary" onclick="searchHistory()" id="btnSearchHistory">查詢</button>
        <button class="btn btn-secondary" onclick="setHistoryQuick(7)">近 7 天</button>
        <button class="btn btn-secondary" onclick="setHistoryQuick(30)">近 30 天</button>
        <button class="btn btn-secondary" onclick="setHistoryQuick(90)">近 90 天</button>
        <select id="historyVendorFilter" onchange="renderHistoryResult()" style="padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;margin-left:auto">
          <option value="">全部廠商</option>
        </select>
      </div>
      <div id="historyStatus" style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px"></div>
      <div id="historyResult"></div>
    </div>
  </div>

  <!-- ============ Tab A: 採購建議 ============ -->
  <div id="paneA" class="tab-pane active">
    <div class="status-bar">
      <div class="sb-item" id="sbOms"><div class="dot"></div>OMS</div>
      <div class="sb-item" id="sbSup"><div class="dot"></div>對照表</div>
      <div class="sb-item" id="sbStk"><div class="dot"></div>庫存</div>
      <div class="sb-item" id="sbSal"><div class="dot"></div>銷量</div>
      <div class="sb-item" id="sbPo"><div class="dot"></div>處理中採購</div>
      <div class="sb-item" id="sbPre"><div class="dot"></div>訂單佔用</div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" id="btnFetch" onclick="openLoadModeModal()">📡 從 OMS 拉取數據</button>
      <span id="fetchSt" style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace"></span>
      <div class="spacer"></div>
      <button class="btn btn-green hidden" id="btnExp" onclick="exportAll()">⬇ 匯出採購建議 Excel</button>
    </div>
    <div id="modeBanner" class="hidden" style="background:#fff8f0;border:1px solid #fed7aa;border-radius:6px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:12px;font-family:'DM Mono',monospace">
      <span style="color:var(--orange);font-weight:600">⚠ 單一模式</span>
      <span id="modeBannerText" style="color:var(--muted);flex:1"></span>
      <button class="btn btn-secondary" onclick="openLoadModeModal()" style="padding:5px 12px;font-size:11px">重新選擇</button>
    </div>
    <div class="loading hidden" id="ldArea"><span class="spinner"></span><span id="ldMsg">讀取中...</span></div>
    <div id="content" class="hidden">
      <div class="summary-grid" id="sumGrid"></div>
      <div id="vendorFilter" class="hidden" style="background:#fff;border:1px solid var(--border);border-radius:7px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px">快速篩選</span>
        <select id="vendorFilterSel" onchange="applyVendorFilter()" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;font-family:'DM Mono',monospace;font-size:12px">
          <option value="">全部供應商</option>
        </select>
        <span id="vendorFilterCount" style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace"></span>
      </div>
      <div class="vendor-config">
        <div class="vc-header" onclick="toggleCfg()">
          <h3>⚙ 供應商交期設定</h3>
          <span style="font-size:11px;color:var(--muted)">交期 + 安全庫存 = 再訂購點（by 供應商）</span>
          <span class="vc-toggle" id="vcTog">▶</span>
        </div>
        <div class="vc-body" id="vcBody">
          <table class="vc-table"><thead><tr><th>廠商</th><th>名稱</th><th>SKU</th><th>需採購</th><th>交期</th><th>安全</th><th>合計</th></tr></thead><tbody id="vcR"></tbody></table>
        </div>
      </div>
      <div class="filter-bar">
        <span class="filter-lbl">篩選</span>
        <div class="chip active" onclick="setF('all',this)">全部</div>
        <div class="chip alert" onclick="setF('alert',this)">⚠ 需採購</div>
        <div class="chip" onclick="setF('ok',this)">充足</div>
        <input class="search-input" placeholder="搜尋..." oninput="sQ=this.value;renderTbl()">
      </div>
      <div id="tblArea"></div>
      <div class="sec-upload" style="background:#fff;border:1px solid var(--border);border-radius:8px;margin-top:24px;overflow:hidden">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
          <h3 style="font-size:14px;font-weight:600">📤 上傳廠商確認單 → OMS</h3>
          <span style="font-size:11px;color:var(--muted)">上傳廠商回傳的 Excel，自動比對條碼後送 OMS 建立採購單</span>
        </div>

async function oP(ep,b){const r=await fetch(P,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':T},body:JSON.stringify({endpoint:ep,body:b})});return r.json();}
let revMap={};
async function ldSup(){const u=`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/A:Q?key=${SK}`;const r=await fetch(u);if(!r.ok)throw new Error('Sheet '+r.status);const j=await r.json();const rows=j.values||[];if(rows.length<2)throw new Error('Sheet空');const h=rows[0],ci=n=>h.indexOf(n);const iC=ci('商品條碼'),iV=ci('廠商編號'),iN=ci('廠商名稱'),iS=ci('廠商貨號'),iSz=ci('尺寸說明'),iCo=ci('廠商顏色說明'),iAct=ci('Shopify啟用'),iNm=ci('商品名稱');supMap={};revMap={};rows.slice(1).forEach(r=>{const c=(r[iC]||'').trim();const active=(r[iAct]||'').trim();if(c&&active==='V'&&!supMap[c]){const vs=(r[iS]||'').trim(),vc=(r[iCo]||'').trim(),vsz=(r[iSz]||'').trim(),nm=iNm>=0?(r[iNm]||'').trim():'';supMap[c]={vid:(r[iV]||'').trim(),vn:(r[iN]||'').trim(),vs,vsz,vc,nm};const rk=`${vs}|||${vc}|||${vsz}`;if(!revMap[rk])revMap[rk]={bc:c,nm}}});return Object.keys(supMap).length;}

// ====== 採購建議 Tab：fetchAll ======
async function fetchAll(){
  const btn=document.getElementById('btnFetch');btn.disabled=true;
  document.getElementById('ldArea').classList.remove('hidden');document.getElementById('content').classList.add('hidden');
  updateModeBanner();const t0=Date.now();
  try{
    sL('載入供應商對照表...');const sc=await ldSup();sS('sbSup',1,`對照表 ${sc}`);
    let skuFilter=null;
    if(loadMode==='single'&&loadVendor){skuFilter=new Set();Object.entries(supMap).forEach(([bc,sp])=>{if(sp.vid===loadVendor)skuFilter.add(bc)});sL(`單一模式：${loadVendor}（${skuFilter.size} SKU）`);}
    sL('拉取庫存...');const sr=await oP('/api/v2/default/getStocksData/searchList',{"view_products_stock.stock_group":"10"});
    let _allStk=sr.retval||[];
    if(skuFilter)_allStk=_allStk.filter(s=>skuFilter.has((s['view_products_stock.products_model']||'').trim()));
    stockD=_allStk;sS('sbOms',1,'OMS 正常');sS('sbStk',1,`庫存 ${stockD.length}`);
    sL('拉取30天訂單明細...');const dd=new Date();dd.setDate(dd.getDate()-SD);const ds=dd.toISOString().slice(0,10);
    const or=await oP('/api/v2/default/apiOrderList/searchDetail',{"orders.created_at@start":[">=",ds]});
    const rv=or.retval||{};const oi=rv['訂單明細']||[];const ob=rv['基本資料']||[];
    sS('sbSal',1,`明細 ${oi.length}（${SD}天）`);
    const odMap={};ob.forEach(o=>{const oid=(o['orders.orders_id']||'').trim();const dt=(o['orders.created_at']||'').slice(0,10);if(oid&&dt)odMap[oid]=dt;});
    skuSal={};skuDates={};
    oi.forEach(i=>{const m=(i['orders_products.products_model']||'').trim();const q=parseInt(i['orders_products.products_quantity']||0);const oid=(i['orders_products.orders_id']||'').trim();if(m&&q>0){skuSal[m]=(skuSal[m]||0)+q;const dt=odMap[oid];if(dt){if(!skuDates[m])skuDates[m]={first:dt,last:dt};if(dt<skuDates[m].first)skuDates[m].first=dt;if(dt>skuDates[m].last)skuDates[m].last=dt;}}});
    pendPO={};pendPOInfo={};
    sL('拉取訂單佔用量...');preSale={};const mktData={};
    for(let mi=0;mi<MARKETS_NO.length;mi++){
      const mNo=MARKETS_NO[mi];sL(`拉取訂單佔用量（賣場 ${mNo}）...`);
      try{const psR=await oP('/api/v2/default/apiMarketsProductsAssign/searchList',{"dyview_markets_products_calc_assign.markets_no":String(mNo)});const psA=psR.retval||[];if(Array.isArray(psA)){mktData[mNo]={};psA.forEach(p=>{const m=(p['dyview_markets_products_calc_assign.products_model']||'').trim();const na=parseInt(p['dyview_markets_products_calc_assign.not_assign_qty']||0);if(m&&(!skuFilter||skuFilter.has(m)))mktData[mNo][m]=na;});}}catch(e){console.warn(`賣場 ${mNo} 拉取失敗:`,e);}
    }
    const allSkus=new Set();Object.values(mktData).forEach(d=>Object.keys(d).forEach(k=>allSkus.add(k)));
    allSkus.forEach(sku=>{const vals=MARKETS_NO.map(m=>mktData[m]?.[sku]??null).filter(v=>v!==null&&v>0);if(vals.length){const v=Math.max(...vals);if(v>0)preSale[sku]=v;}});
    sS('sbPre',1,`訂單佔用 ${Object.keys(preSale).length} SKU`);
    // 只拉 status=60 處理中的採購單，算「採購中」量
    sL('拉取處理中採購單...');
    try{
      const hR=await oP('/api/v2/default/apiPurchaseHeaderList/searchList',{"purchase_header.status":"60"});
      const ha=(hR.retval||{}).purchase_header||hR.retval||[];
      const headers=Array.isArray(ha)?ha:[];
      for(let i=0;i<headers.length;i++){
        const h=headers[i];const pn=(h['purchase_header.purchase_no']||'').trim();const cd=(h['purchase_header.created_at']||'').slice(0,10);
        if(!pn)continue;
        if(loadMode==='single'&&loadVendor){const mch=pn.match(/-([A-Z0-9]+)$/i);if(!mch||mch[1].toUpperCase()!==loadVendor.toUpperCase())continue;}
        sL(`拉取處理中採購單明細 ${i+1}/${headers.length}（${pn}）...`);
        try{
          const dR=await oP('/api/v2/default/apiPurchaseHeaderList/searchDetail',{"purchase_header.purchase_no":pn});
          const da=(dR.retval||{}).purchase||[];
          if(Array.isArray(da)){da.forEach(p=>{const m=(p['purchase.products_model']||'').trim();const pq=parseInt(p['purchase.purchase_quantity']||0);const sq=parseInt(p['purchase.stock_quantity']||0);if(!m||pq<=0)return;const rem=pq-sq;if(rem>0){pendPO[m]=(pendPO[m]||0)+rem;if(!pendPOInfo[m])pendPOInfo[m]={count:0,latestDate:'',qty:0};pendPOInfo[m].count+=1;pendPOInfo[m].qty+=rem;if(cd&&cd>pendPOInfo[m].latestDate)pendPOInfo[m].latestDate=cd;}});}
        }catch(e){console.warn(`單號 ${pn} 失敗`,e);}
      }
      sS('sbPo',1,`處理中 ${Object.keys(pendPO).length} SKU`);
    }catch(e){console.warn('處理中採購單拉取失敗',e);sS('sbPo',0,'處理中採購');}

    sL('合併計算...');doMerge();initVendorFilter();
    document.getElementById('ldArea').classList.add('hidden');document.getElementById('content').classList.remove('hidden');document.getElementById('btnExp').classList.remove('hidden');
    document.getElementById('dot').className='dot ok';document.getElementById('dotLabel').textContent='數據就緒';
    const elapsed=Math.round((Date.now()-t0)/1000);document.getElementById('fetchSt').textContent=`更新 ${new Date().toLocaleTimeString('zh-TW')}（耗時 ${elapsed}s）`;
    renderAll();
  }catch(e){document.getElementById('ldArea').classList.add('hidden');document.getElementById('fetchSt').textContent='錯誤：'+e.message;document.getElementById('dot').className='dot err';toast('失敗：'+e.message);console.error(e);}
  btn.disabled=false;
}
function sL(m){document.getElementById('ldMsg').textContent=m;}
function sS(id,ok,t){const e=document.getElementById(id);e.className='sb-item'+(ok?' ok':'');e.innerHTML=`<div class="dot"></div>${t}`;}
function doMerge(){
  const sm={};stockD.forEach(s=>{const m=(s['view_products_stock.products_model']||'').trim();const q=parseInt(s['view_products_stock.stock_qty']||0);const n=(s['view_products_stock.products_name']||'').trim();if(!m)return;if(!sm[m])sm[m]={stk:0,nm:n};sm[m].stk+=q;});
  merged=[];const today=new Date().toISOString().slice(0,10);
  Object.entries(sm).forEach(([bc,inf])=>{
    const sp=supMap[bc];if(!sp)return;
    const sold=skuSal[bc]||0;const po=pendPO[bc]||0;const ps=preSale[bc]||0;const pInfo=pendPOInfo[bc]||null;const vid=sp.vid;const vc=gVC(vid);
    let effDays=SD;let isStockout=false;const dates=skuDates[bc];
    if(inf.stk===0&&sold>0&&dates){const lastMs=new Date(dates.last).getTime();const todayMs=new Date(today).getTime();const daysSinceLast=Math.round((todayMs-lastMs)/(86400000));if(daysSinceLast>7){const firstMs=new Date(dates.first).getTime();const span=Math.round((lastMs-firstMs)/(86400000))+1;effDays=Math.max(1,span);isStockout=true;}}
    const da=Math.round((sold/effDays)*100)/100;const rop=Math.ceil(da*(vc.ld+vc.sf));const eff=inf.stk+po-ps;const rawSug=Math.max(0,rop-eff);const sug=rawSug>0?Math.ceil(rawSug/10)*10:0;
    const need=eff<rop&&da>0;const shortage=Math.max(0,rop-eff);const dl=da>0?Math.floor(Math.max(0,inf.stk-ps)/da):999;const urgent=need&&dl<=3&&po===0;
    merged.push({bc,nm:inf.nm,vid,vn:sp.vn||'',vs:sp.vs||'',vc2:sp.vc||'',vsz:sp.vsz||'',stk:inf.stk,s30:sold,da,po,ps,rop,sug,shortage,need,urgent,dl,isStockout,effDays,pInfo,eff});
  });
  merged.sort((a,b)=>{if(a.urgent!==b.urgent)return a.urgent?-1:1;if(a.need!==b.need)return a.need?-1:1;return a.dl-b.dl;});
  Object.entries(sm).forEach(([bc,inf])=>{if(supMap[bc]&&inf.nm){supMap[bc].nm=inf.nm;const sp=supMap[bc];const rk=`${sp.vs}|||${sp.vc}|||${sp.vsz}`;if(revMap[rk])revMap[rk].nm=inf.nm;}});
}
function renderAll(){renderSum();renderVC();renderTbl();}
function renderSum(){

    <div class="card"><div class="card-lbl">追蹤 SKU</div><div class="card-val">${omsMatch}</div><div class="card-sub">Shopify ${shopifyTotal} · ${vs.size} 供應商</div></div>
    <div class="card"><div class="card-lbl">總庫存</div><div class="card-val">${tStk.toLocaleString()}</div><div class="card-sub">良品</div></div>
    <div class="card"><div class="card-lbl">處理中採購</div><div class="card-val" style="color:var(--orange)">${tPo.toLocaleString()}</div><div class="card-sub">已下單未到</div></div>

let poItems=[];let poSheetName='';let poFileName='';
function parsePoFile(){
  const fileEl=document.getElementById('poFile');if(!fileEl.files.length){toast('請選擇檔案');return;}
  if(Object.keys(revMap).length===0){toast('請先拉取數據');return;}
  poFileName=fileEl.files[0].name;const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});poItems=[];poSheetName=wb.SheetNames[0]||'';let unmatchCount=0;
      wb.SheetNames.forEach(sn=>{const ws=wb.Sheets[sn];const data=XLSX.utils.sheet_to_json(ws,{defval:''});data.forEach(row=>{const vs=(row['廠商貨號']||'').toString().trim();const vc=(row['廠商顏色說明']||'').toString().trim();const vsz=(row['尺寸說明']||'').toString().trim();const qty=parseInt(row['建議採購量']||row['採購量']||row['數量']||0);const memo=(row['備註']||'').toString().trim();if(!vs||qty<=0)return;const rk=`${vs}|||${vc}|||${vsz}`;const match=revMap[rk];if(match){const sup=supMap[match.bc]||{};poItems.push({vs,vc,vsz,qty,memo,bc:match.bc,nm:sup.nm||match.nm||'',vid:sup.vid||'',vn:sup.vn||'',matched:true});}else{poItems.push({vs,vc,vsz,qty,memo,bc:'',nm:'',vid:'',vn:'',matched:false});unmatchCount++;}});});
      if(poItems.length===0){toast('Excel 中沒有有效的採購項目');return;}
      document.getElementById('parseSt').textContent=`解析完成：${poItems.length} 筆${unmatchCount>0?`，${unmatchCount} 筆未對照`:''}`;
      renderPoPreview();document.getElementById('poPreview').classList.remove('hidden');document.getElementById('poActions').classList.remove('hidden');document.getElementById('poActions').style.display='flex';
    }catch(err){toast('解析失敗：'+err.message);console.error(err);}
  };
  reader.readAsArrayBuffer(fileEl.files[0]);
}

async function submitToOms(){
  const matched=poItems.filter(i=>i.matched);if(!matched.length){toast('沒有可送出的項目');return;}
  const btn=document.getElementById('btnSubmit');const st=document.getElementById('submitSt');btn.disabled=true;st.textContent='送出中...';
  const vendorCode=poSheetName||poFileName.replace(/.*_/,'').replace(/\.xlsx?$/i,'')||'XX';
  const poNo=`PO-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${vendorCode}`;
  const items=matched.map(i=>({purchase_no:poNo,purchase_type:'default',supplier_model:i.vs,products_model:i.bc,products_ean:i.bc,name:i.nm||i.vs,warehouse_no:'1',purchase_quantity:i.qty,memo:i.memo||'採購平台自動上傳'}));
  try{
    const res=await oP('/api/v2/default/action/createPurchase',items);
    const failMatch=res.msg&&res.msg.match(/失敗筆數\s*(\d+)/);const failCount=failMatch?parseInt(failMatch[1]):null;const ok=(res.done===true&&failCount===0)||(res.result===true);
    if(ok){
      st.innerHTML=`<span style="color:var(--green);font-weight:600">✓ ${res.msg}，採購單號 ${poNo}</span>`;toast('✓ 採購單已送出');
      const tracking=document.getElementById('poTracking').value.trim();const memo=document.getElementById('poMemo').value.trim();
      if(tracking||memo){try{await fetch(PO_META_API,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':T},body:JSON.stringify({action:'save',purchase_no:poNo,vendor_id:vendorCode,tracking,memo})});}catch(e){}}
      // 寄送 email 通知
      const supplierName=(Object.values(supMap).find(s=>s.vid===vendorCode)||{}).vn||'';
      const emailOrders=[{purchase_no:poNo,vendor:`${vendorCode}${supplierName?' '+supplierName:''}`,sku_count:matched.length,total_qty:matched.reduce((s,i)=>s+i.qty,0),tracking,memo}];
      try{
        const er=await fetch(SEND_EMAIL_API,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':T},body:JSON.stringify({orders:emailOrders})});
        const ej=await er.json();
        if(ej.ok||ej.result){st.innerHTML+=`<span style="color:var(--green);font-size:11px;margin-left:8px">✉ 通知信已寄出</span>`;}
        else{st.innerHTML+=`<span style="color:var(--orange);font-size:11px;margin-left:8px">⚠ 通知信寄送失敗（採購單已建立）</span>`;console.warn('Email 失敗:',ej);}
      }catch(emailErr){st.innerHTML+=`<span style="color:var(--orange);font-size:11px;margin-left:8px">⚠ 通知信寄送失敗（採購單已建立）</span>`;console.warn('Email 失敗:',emailErr);}
    }else{st.innerHTML=`<span style="color:var(--red);font-weight:600">✗ ${res.msg||'未知錯誤'}</span>`;toast('送出失敗');}
  }catch(err){st.innerHTML=`<span style="color:var(--red)">✗ ${err.message}</span>`;toast('送出失敗');}
  btn.disabled=false;
}

    }
    // 過濾日期範圍
    const hd=new Date();hd.setDate(hd.getDate()-poTabDays);const hdMs=hd.getTime();
    headers=headers.filter(h=>{const d=h['purchase_header.created_at']||'';if(!d)return false;return new Date(d).getTime()>=hdMs;});
    // 拉每張單明細
    poTabRows=[];
    for(let i=0;i<headers.length;i++){
      const h=headers[i];const pn=(h['purchase_header.purchase_no']||'').trim();const cd=(h['purchase_header.created_at']||'').slice(0,10);const hStatus=(h['purchase_header.status']||'').toString();
      if(!pn)continue;
      document.getElementById('ldMsgB').textContent=`拉取明細 ${i+1}/${headers.length}（${pn}）...`;
      try{
        const dR=await oP('/api/v2/default/apiPurchaseHeaderList/searchDetail',{"purchase_header.purchase_no":pn});
        const da=(dR.retval||{}).purchase||[];const poItems=[];let totalQty=0,totalIn=0,vid=null;
        if(Array.isArray(da)){da.forEach(p=>{const m=(p['purchase.products_model']||'').trim();const pq=parseInt(p['purchase.purchase_quantity']||0);const sq=parseInt(p['purchase.stock_quantity']||0);const nm=(p['purchase.name']||'').trim();const vs=(p['purchase.products.supplier_model']||'').trim();const color=(p['purchase.color']||'').trim();const size=(p['purchase.size']||'').trim();const memo=(p['purchase.memo']||'').trim();if(!m||pq<=0)return;const sp=supMap[m];if(sp&&!vid)vid=sp.vid;poItems.push({sku:m,nm,vs,color,size,pq,sq,memo});totalQty+=pq;totalIn+=sq;});}
        if(!vid){const mch=pn.match(/-([A-Z0-9]+)$/i);if(mch)vid=mch[1];}
        poTabRows.push({pn,date:cd,status:hStatus,totalQty,totalIn,skuCount:poItems.length,items:poItems,vid:vid||'?'});
      }catch(e){console.warn(`${pn} 失敗`,e);}
    }
    poTabRows.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    // 批次拉 meta
    document.getElementById('ldMsgB').textContent='讀取追蹤單號與備註...';
    const pns=poTabRows.map(r=>r.pn).filter(pn=>!(pn in poTabMetaCache));
    if(pns.length){
      try{
        const r=await fetch(PO_META_API,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':T},body:JSON.stringify({action:'batch_get',purchase_nos:pns})});
        const j=await r.json();
        if(j.ok&&j.records)pns.forEach(pn=>{poTabMetaCache[pn]=j.records[pn]||null;});
      }catch(e){console.warn('讀 po-meta 失敗',e);}
    }
    document.getElementById('ldAreaB').classList.add('hidden');
    document.getElementById('poTabContent').classList.remove('hidden');
    const elapsed=Math.round((Date.now()-t0)/1000);
    document.getElementById('fetchStB').textContent=`更新 ${new Date().toLocaleTimeString('zh-TW')}（耗時 ${elapsed}s）`;
    renderPOTabSummary();renderPOTabList();
  }catch(e){
    document.getElementById('ldAreaB').classList.add('hidden');
    document.getElementById('fetchStB').textContent='錯誤：'+e.message;
    toast('失敗：'+e.message);console.error(e);
  }
  btn.disabled=false;
}

function renderPOTabList(){

  Object.entries(vs).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([vid,list])=>{

function startMetaEdit(pn,field,safeId,event){

  if(!disp||!inp)return;disp.style.display='none';inp.style.display='block';inp.focus();inp.select();

function cancelMetaEdit(field,safeId){
  const disp=document.getElementById(`metaDisp-${field}-${safeId}`);const inp=document.getElementById(`metaInp-${field}-${safeId}`);
  if(!disp||!inp)return;inp.style.display='none';disp.style.display='';
}
async function saveMetaField(pn,field,safeId){
  const inp=document.getElementById(`metaInp-${field}-${safeId}`);const disp=document.getElementById(`metaDisp-${field}-${safeId}`);const saving=document.getElementById(`metaSaving-${field}-${safeId}`);
  if(!inp||!disp)return;
  const newVal=inp.value.trim();inp.style.display='none';saving.style.display='inline';
  if(!poTabMetaCache[pn])poTabMetaCache[pn]={};
  const oldVal=poTabMetaCache[pn][field]||'';poTabMetaCache[pn][field]=newVal;
  const tracking=field==='tracking'?newVal:(poTabMetaCache[pn].tracking||'');
  const memo=field==='memo'?newVal:(poTabMetaCache[pn].memo||'');
  const mch=pn.match(/-([A-Z0-9]+)$/i);const vendor_id=mch?mch[1]:'';
  try{
    const r=await fetch(PO_META_API,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':T},body:JSON.stringify({action:'save',purchase_no:pn,vendor_id,tracking,memo})});
    const j=await r.json();
    if(j.ok||j.success){disp.textContent=newVal||'—';disp.className='meta-display'+(newVal?'':' empty');toast('✓ 已儲存');}
    else{poTabMetaCache[pn][field]=oldVal;disp.textContent=oldVal||'—';disp.className='meta-display'+(oldVal?'':' empty');toast('儲存失敗：'+(j.error||'?'));}
  }catch(e){poTabMetaCache[pn][field]=oldVal;disp.textContent=oldVal||'—';disp.className='meta-display'+(oldVal?'':' empty');toast('儲存失敗：'+e.message);}
  saving.style.display='none';disp.style.display='';
}

async function togglePOTabReceive(origIdx,safeId,event){
  if(event)event.stopPropagation();
  const tr=document.getElementById(`poTabReceive-${safeId}`);const ct=document.getElementById(`poTabReceiveCt-${safeId}`);
  if(!tr)return;
  if(tr.style.display==='none'){
    const po=poTabRows[origIdx];
    if(!poTabReceiveQty[safeId]){
      ct.innerHTML='<div style="padding:16px 20px;font-size:12px;color:var(--muted);font-family:\'DM Mono\',monospace"><span class="spinner"></span>讀取對帳紀錄...</div>';
      tr.style.display='table-row';
      try{
        const r=await fetch(`${RECEIVE_API}?action=get&purchase_no=${encodeURIComponent(po.pn)}`,{method:'GET',headers:{'x-proxy-token':T}});
        const j=await r.json();
        poTabReceiveQty[safeId]={};
        if(j.ok&&j.record&&Array.isArray(j.record.items)){
          const recMap={};j.record.items.forEach(it=>{recMap[it.sku]=it.received;});
          po.items.forEach(it=>{poTabReceiveQty[safeId][it.sku]=recMap[it.sku]??(it.pq-it.sq);});
          poTabReceiveState[safeId+'_note']=j.record.notes||'';
          poTabReceiveState[safeId+'_loaded']=true;
        }else{
          po.items.forEach(it=>{poTabReceiveQty[safeId][it.sku]=it.pq-it.sq;});
        }
      }catch(e){
        console.warn('讀取對帳紀錄失敗',e);
        po.items.forEach(it=>{poTabReceiveQty[safeId][it.sku]=it.pq-it.sq;});
      }
    }
    ct.innerHTML=renderPOTabReceiveArea(origIdx,safeId);
    tr.style.display='table-row';
  }else{tr.style.display='none';}
}

function renderPOTabReceiveArea(origIdx,safeId){
  const po=poTabRows[origIdx];const qMap=poTabReceiveQty[safeId]||{};
  let totalOrdered=0,totalReceived=0,shortCount=0,overCount=0,okCount=0;
  po.items.forEach(it=>{const ord=it.pq-it.sq;const rec=qMap[it.sku]??ord;totalOrdered+=ord;totalReceived+=rec;const d=rec-ord;if(d===0)okCount++;else if(d<0)shortCount++;else overCount++;});
  let rows='';
  po.items.forEach(it=>{
    const ord=it.pq-it.sq;const rec=qMap[it.sku]??ord;const diff=rec-ord;
    let cls='',diffHtml='';
    if(diff===0){cls='diff-ok';diffHtml='<span class="diff-tag ok">一致</span>';}
    else if(diff<0){cls='diff-short';diffHtml=`<span class="diff-tag short">${diff}</span>`;}
    else{cls='diff-over';diffHtml=`<span class="diff-tag over">+${diff}</span>`;}
    rows+=`<tr>
      <td style="padding:6px 10px;font-size:11px;font-family:'DM Mono',monospace">${it.vs||'—'}</td>
      <td style="padding:6px 10px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${it.sku}</td>
      <td style="padding:6px 10px;font-size:11px">${it.color||'—'}</td>
      <td style="padding:6px 10px;font-size:11px">${it.size||'—'}</td>
      <td style="padding:6px 10px;font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.nm||'—'}</td>
      <td style="padding:6px 10px;text-align:right;font-size:12px;font-family:'DM Mono',monospace;font-weight:600">${ord}</td>
      <td style="padding:6px 10px;text-align:right"><input type="number" min="0" class="qty-input ${cls}" value="${rec}" oninput="updatePOTabReceiveQty(${origIdx},'${safeId}','${it.sku}',this.value)"></td>
      <td style="padding:6px 10px">${diffHtml}</td>
    </tr>`;
  });
  const noteVal=poTabReceiveState[safeId+'_note']||'';
  const loaded=poTabReceiveState[safeId+'_loaded'];
  const sourceTag=loaded?'<span style="font-size:10px;color:var(--green);font-weight:400;margin-left:8px">✓ 已從雲端載入</span>':'<span style="font-size:10px;color:var(--muted2);font-weight:400;margin-left:8px">尚未對帳</span>';
  return`<div class="receive-title">📥 對帳作業${sourceTag}
    <span style="font-size:10px;font-weight:400;color:var(--muted);margin-left:auto">輸入實到量，Enter 或點別處自動更新</span>
  </div>
  <div class="receive-summary">
    <div class="rs-card"><div class="rs-lbl">應到</div><div class="rs-val" id="rsOrdered-${safeId}">${totalOrdered}</div></div>
    <div class="rs-card ${totalReceived===totalOrdered?'ok':''}"><div class="rs-lbl">實到</div><div class="rs-val" id="rsReceived-${safeId}" style="color:var(--green)">${totalReceived}</div></div>
    <div class="rs-card ${okCount>0?'ok':''}"><div class="rs-lbl">一致</div><div class="rs-val" id="rsOk-${safeId}">${okCount}</div></div>
    <div class="rs-card ${shortCount>0?'alert':''}"><div class="rs-lbl">短少</div><div class="rs-val" id="rsShort-${safeId}">${shortCount}</div></div>
    <div class="rs-card ${overCount>0?'alert':''}"><div class="rs-lbl">多送</div><div class="rs-val" id="rsOver-${safeId}">${overCount}</div></div>
  </div>
  <div style="overflow-x:auto"><table class="receive-table">
    <thead><tr>
      <th>廠商貨號</th><th>條碼</th><th>顏色</th><th>尺寸</th><th>品名</th>
      <th style="text-align:right">採購量</th><th style="text-align:right">實到量</th><th>差異</th>
    </tr></thead>
    <tbody id="receiveTbody-${safeId}">${rows}</tbody>
  </table></div>
  <div style="margin-top:10px">
    <label style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">對帳備註</label>
    <textarea class="receive-note-input" id="receiveNote-${safeId}" placeholder="例：司機說另一箱下週補送">${noteVal}</textarea>
  </div>
  <div style="margin-top:10px;display:flex;gap:10px;align-items:center">
    <button class="btn btn-green" style="font-size:12px;padding:7px 16px" onclick="savePOTabReceive(${origIdx},'${safeId}')">💾 儲存對帳</button>
    <span id="receiveSt-${safeId}" style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace"></span>
  </div>`;
}

function updatePOTabReceiveQty(origIdx,safeId,sku,val){
  if(!poTabReceiveQty[safeId])poTabReceiveQty[safeId]={};
  poTabReceiveQty[safeId][sku]=parseInt(val)||0;
  const po=poTabRows[origIdx];const qMap=poTabReceiveQty[safeId];
  let totalOrdered=0,totalReceived=0,shortCount=0,overCount=0,okCount=0;
  po.items.forEach(it=>{const ord=it.pq-it.sq;const rec=qMap[it.sku]??ord;totalOrdered+=ord;totalReceived+=rec;const d=rec-ord;if(d===0)okCount++;else if(d<0)shortCount++;else overCount++;});
  const s=id=>document.getElementById(id);
  if(s(`rsOrdered-${safeId}`))s(`rsOrdered-${safeId}`).textContent=totalOrdered;
  if(s(`rsReceived-${safeId}`))s(`rsReceived-${safeId}`).textContent=totalReceived;
  if(s(`rsOk-${safeId}`))s(`rsOk-${safeId}`).textContent=okCount;
  if(s(`rsShort-${safeId}`))s(`rsShort-${safeId}`).textContent=shortCount;
  if(s(`rsOver-${safeId}`))s(`rsOver-${safeId}`).textContent=overCount;
  const tbody=document.getElementById(`receiveTbody-${safeId}`);
  if(!tbody)return;
  const rows=tbody.querySelectorAll('tr');
  po.items.forEach((it,i)=>{
    const ord=it.pq-it.sq;const rec=qMap[it.sku]??ord;const diff=rec-ord;
    const inp=rows[i]?.querySelector('.qty-input');const diffTd=rows[i]?.querySelectorAll('td')[7];
    if(inp){inp.className='qty-input '+(diff===0?'diff-ok':diff<0?'diff-short':'diff-over');}
    if(diffTd){
      if(diff===0)diffTd.innerHTML='<span class="diff-tag ok">一致</span>';
      else if(diff<0)diffTd.innerHTML=`<span class="diff-tag short">${diff}</span>`;
      else diffTd.innerHTML=`<span class="diff-tag over">+${diff}</span>`;
    }
  });
}

async function savePOTabReceive(origIdx,safeId){
  const po=poTabRows[origIdx];const qMap=poTabReceiveQty[safeId]||{};
  const noteEl=document.getElementById(`receiveNote-${safeId}`);const notes=noteEl?noteEl.value:'';
  const stEl=document.getElementById(`receiveSt-${safeId}`);
  if(stEl)stEl.textContent='儲存中...';
  const items=po.items.map(it=>{
    const ord=it.pq-it.sq;const rec=qMap[it.sku]??ord;const diff=rec-ord;
    let status='ok',instruction='數量一致';
    if(diff<0){status='short';instruction=`短少 ${Math.abs(diff)} 件，以實到 ${rec} 件結案`;}
    else if(diff>0){status='over';instruction=`多送 ${diff} 件，以實到 ${rec} 件結案`;}
    return{sku:it.sku,vs:it.vs,vc:it.color,vsz:it.size,nm:it.nm,ordered:ord,received:rec,diff,status,instruction};
  });
  const summary={total_ordered:items.reduce((s,i)=>s+i.ordered,0),total_received:items.reduce((s,i)=>s+i.received,0),ok_count:items.filter(i=>i.status==='ok').length,short_count:items.filter(i=>i.status==='short').length,over_count:items.filter(i=>i.status==='over').length};
  const mch=po.pn.match(/-([A-Z0-9]+)$/i);const vendor_id=mch?mch[1]:po.vid;
  const payload={action:'save',purchase_no:po.pn,vendor_id,checker:'採購平台',items,summary,notes};
  try{
    const r=await fetch(RECEIVE_API,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-token':T},body:JSON.stringify(payload)});
    const j=await r.json();
    if(j.ok){
      poTabReceiveState[safeId+'_note']=notes;
      poTabReceiveState[safeId+'_loaded']=true;
      if(stEl)stEl.innerHTML=`<span style="color:var(--green);font-weight:600">✓ 已儲存（${new Date().toLocaleTimeString('zh-TW')}）</span>`;toast('✓ 對帳已儲存');
    }
    else{if(stEl)stEl.innerHTML=`<span style="color:var(--red)">✗ ${j.error||'儲存失敗'}</span>`;toast('儲存失敗');}
  }catch(e){if(stEl)stEl.innerHTML=`<span style="color:var(--red)">✗ ${e.message}</span>`;toast('儲存失敗：'+e.message);}
}

// ===== by day 歷史採購單查詢（兩個 Tab 共用）=====
let historyRows=[];
function toggleHistoryBlock(){
  const body=document.getElementById('historyBody');const tog=document.getElementById('historyToggle');
  if(body.style.display==='none'){
    body.style.display='block';tog.textContent='▼ 收合';
    if(!document.getElementById('historyStartDate').value){
      const today=new Date();const ago30=new Date();ago30.setDate(today.getDate()-30);
      document.getElementById('historyStartDate').value=ago30.toISOString().slice(0,10);
      document.getElementById('historyEndDate').value=today.toISOString().slice(0,10);
    }
  }else{body.style.display='none';tog.textContent='▶ 展開';}
}
function setHistoryQuick(days){
  const end=new Date();const start=new Date();start.setDate(end.getDate()-days);
  document.getElementById('historyStartDate').value=start.toISOString().slice(0,10);
  document.getElementById('historyEndDate').value=end.toISOString().slice(0,10);
  searchHistory();
}
async function searchHistory(){
  const start=document.getElementById('historyStartDate').value;
  const end=document.getElementById('historyEndDate').value;
  const status=document.getElementById('historyStatus');const result=document.getElementById('historyResult');
  const btn=document.getElementById('btnSearchHistory');
  if(!start){toast('請選擇開始日期');return;}
  btn.disabled=true;status.innerHTML='<span class="spinner"></span> 查詢中…';result.innerHTML='';
  try{
    const statusList=['60','62','65','69'];let headers=[];
    for(const st of statusList){
      try{const hR=await oP('/api/v2/default/apiPurchaseHeaderList/searchList',{"purchase_header.status":st});const ha=(hR.retval||{}).purchase_header||hR.retval||[];if(Array.isArray(ha))headers=headers.concat(ha);}catch(e){console.warn(`status ${st} 失敗`,e);}
    }
    const startMs=new Date(start+'T00:00:00').getTime();
    const endMs=end?new Date(end+'T23:59:59').getTime():Infinity;
    headers=headers.filter(h=>{const d=h['purchase_header.created_at']||'';if(!d)return false;const ts=new Date(d).getTime();return ts>=startMs&&ts<=endMs;});
    historyRows=[];
    for(let i=0;i<headers.length;i++){
      const h=headers[i];const pn=(h['purchase_header.purchase_no']||'').trim();const cd=(h['purchase_header.created_at']||'').slice(0,10);const hStatus=(h['purchase_header.status']||'').toString();
      if(!pn)continue;
      status.innerHTML=`<span class="spinner"></span> 拉取明細 ${i+1}/${headers.length}（${pn}）...`;
      try{
        const dR=await oP('/api/v2/default/apiPurchaseHeaderList/searchDetail',{"purchase_header.purchase_no":pn});
        const da=(dR.retval||{}).purchase||[];let totalQty=0,totalIn=0,vid=null;const skuSet=new Set();
        if(Array.isArray(da)){da.forEach(p=>{const m=(p['purchase.products_model']||'').trim();const pq=parseInt(p['purchase.purchase_quantity']||0);const sq=parseInt(p['purchase.stock_quantity']||0);if(!m||pq<=0)return;skuSet.add(m);totalQty+=pq;totalIn+=sq;const sp=supMap[m];if(sp&&!vid)vid=sp.vid;});}
        if(!vid){const mch=pn.match(/-([A-Z0-9]+)$/i);if(mch)vid=mch[1];}
        historyRows.push({pn,date:cd,status:hStatus,totalQty,totalIn,skuCount:skuSet.size,vid:vid||'?'});
      }catch(e){console.warn(`${pn} 失敗`,e);}
    }
    historyRows.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const vs={};historyRows.forEach(r=>{vs[r.vid]=(vs[r.vid]||0)+1});
    const sel=document.getElementById('historyVendorFilter');const curVal=sel.value;
    sel.innerHTML='<option value="">全部廠商</option>'+Object.entries(vs).sort((a,b)=>a[0].localeCompare(b[0])).map(([v,c])=>`<option value="${v}">${v} (${c})</option>`).join('');
    sel.value=curVal;
    renderHistoryResult();
  }catch(err){status.innerHTML=`<span style="color:var(--red)">查詢失敗：${err.message}</span>`;console.error(err);}
  btn.disabled=false;
}
function renderHistoryResult(){
  const result=document.getElementById('historyResult');const status=document.getElementById('historyStatus');
  const filterVid=document.getElementById('historyVendorFilter').value;
  let rows=historyRows;
  if(filterVid)rows=rows.filter(r=>r.vid===filterVid);
  if(!rows.length){status.textContent='';result.innerHTML='<div class="loading">此區間沒有採購單</div>';return;}
  const totalQty=rows.reduce((s,r)=>s+r.totalQty,0);
  const totalIn=rows.reduce((s,r)=>s+r.totalIn,0);
  status.innerHTML=`共 <strong>${rows.length}</strong> 張採購單　|　採購量 <strong style="color:var(--text)">${totalQty.toLocaleString()}</strong>　|　已入庫 <strong style="color:var(--green)">${totalIn.toLocaleString()}</strong>　|　待入庫 <strong style="color:var(--orange)">${(totalQty-totalIn).toLocaleString()}</strong>`;
  const stMap={'60':{txt:'處理中',color:'var(--orange)'},'62':{txt:'QC中',color:'var(--orange)'},'65':{txt:'已回寫',color:'var(--green)'},'69':{txt:'已結案',color:'var(--green)'}};
  result.innerHTML=`<div class="tbl-wrap"><table style="min-width:900px">
    <thead><tr>
      <th>採購單號</th><th>建立日期</th><th>廠商</th><th>狀態</th>
      <th class="text-right">SKU 數</th><th class="text-right">採購量</th>
      <th class="text-right">已入庫</th><th class="text-right">待入庫</th>
    </tr></thead><tbody>
    ${rows.map(r=>{const st=stMap[r.status]||{txt:r.status,color:'var(--muted)'};const remain=r.totalQty-r.totalIn;return`<tr>
      <td class="mono" style="font-weight:600">${r.pn}</td>
      <td class="mono" style="color:var(--muted)">${r.date||'—'}</td>
      <td class="mono"><span class="vbadge">${r.vid}</span></td>
      <td><span style="color:${st.color};font-weight:600;font-family:'DM Mono',monospace;font-size:11px">${st.txt}</span></td>
      <td class="mono text-right">${r.skuCount}</td>
      <td class="mono text-right" style="font-weight:600">${r.totalQty}</td>
      <td class="mono text-right" style="color:var(--green)">${r.totalIn}</td>
      <td class="mono text-right" style="color:${remain>0?'var(--orange);font-weight:700':'var(--muted2)'}">${remain>0?remain:'—'}</td>
    </tr>`}).join('')}
    </tbody></table></div>`;
}
