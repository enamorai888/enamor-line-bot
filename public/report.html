<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR 問題回報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F0E8;color:#1C1C1A;font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh}

/* LOGIN */
#loginGate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
#loginBox{background:#fff;border:1px solid #d8d4cc;border-radius:10px;padding:44px 36px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.08)}
#loginBox img{height:24px;margin-bottom:20px}
#loginBox .lt{font-family:'DM Mono',monospace;font-size:13px;color:#9C9A92;letter-spacing:.5px;margin-bottom:24px}
#loginBox input{width:100%;padding:11px 14px;border:1px solid #d8d4cc;border-radius:5px;font-size:13px;color:#1C1C1A;background:#FAFAF7;margin-bottom:12px;text-align:center}
#loginBox input:focus{outline:none;border-color:#8B6F47}
#loginBox input[type=password]{font-family:'DM Mono',monospace;letter-spacing:4px;font-size:14px}
#loginBox input[type=text]{font-family:'Noto Sans TC',sans-serif;font-weight:300}
#loginBox button{width:100%;padding:11px;background:#1C1C1A;color:#FAFAF7;border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;cursor:pointer}
#loginBox button:hover{opacity:.85}
#loginErr{font-size:12px;color:#991b1b;margin-top:10px;display:none}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e0e0d8;padding:14px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.04)}
header img{height:28px}
header .ht{font-size:13px;color:#9C9A92;font-family:'DM Mono',monospace;letter-spacing:.5px}
header .sp{flex:1}
header .ub{font-family:'DM Mono',monospace;font-size:11px;color:#5C5C58;background:#F5F0E8;padding:4px 12px;border-radius:12px}

/* APP */
#app{display:none}
.wrap{max-width:800px;margin:0 auto;padding:24px 28px}

/* FORM */
.card{background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:24px;margin-bottom:24px}
.card-t{font-family:'DM Mono',monospace;font-size:11px;color:#9C9A92;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#9C9A92;margin-bottom:5px;font-family:'DM Mono',monospace}
.fld textarea{width:100%;background:#FAFAF7;border:1px solid #e0e0d8;border-radius:5px;padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:300;color:#1C1C1A;resize:vertical;min-height:80px;line-height:1.6}
.fld textarea:focus{outline:none;border-color:#8B6F47}

.tr{display:flex;gap:5px;flex-wrap:wrap}
.tb{padding:4px 12px;border:1px solid #e0e0d8;border-radius:16px;background:none;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;color:#9C9A92;transition:all .15s}
.tb:hover{color:#1C1C1A;border-color:#1C1C1A}
.tb.sel{color:#1C1C1A;font-weight:400;background:#F5F0E8;border-color:#8B6F47}

.ur{display:flex;gap:5px}
.ub2{padding:4px 12px;border:1px solid #e0e0d8;border-radius:4px;background:none;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;color:#9C9A92;transition:all .15s}
.ub2:hover{border-color:#1C1C1A;color:#1C1C1A}
.ub2.s1{background:#eef5f1;color:#4a7c59;border-color:#c8ddd0}
.ub2.s2{background:#fffbeb;color:#92400e;border-color:#fde68a}
.ub2.s3{background:#fef2f2;color:#991b1b;border-color:#fecaca}

.sbtn{width:100%;padding:11px;background:#1C1C1A;color:#FAFAF7;border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;cursor:pointer;margin-top:4px}
.sbtn:hover{opacity:.85}
.sbtn:disabled{opacity:.4;cursor:not-allowed}

/* HISTORY */
.hist-t{font-family:'DM Mono',monospace;font-size:11px;color:#9C9A92;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.rbtn{padding:3px 10px;border:1px solid #e0e0d8;border-radius:4px;background:none;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;color:#9C9A92}
.rbtn:hover{color:#1C1C1A;border-color:#1C1C1A}

.rc{background:#fff;border:1px solid #e0e0d8;border-radius:6px;padding:16px 18px;margin-bottom:10px}
.rc:hover{border-color:#9C9A92}
.rc.done{opacity:.45}
.rc.done .rc-c{text-decoration:line-through}
.rc-top{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.rc-tg{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-family:'DM Mono',monospace;background:#F5F0E8}
.rc-urg{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px}
.rc-urg.u1{background:#eef5f1;color:#4a7c59}
.rc-urg.u2{background:#fffbeb;color:#92400e}
.rc-urg.u3{background:#fef2f2;color:#991b1b}
.rc-tm{font-family:'DM Mono',monospace;font-size:10px;color:#9C9A92;margin-left:auto}
.rc-c{font-size:13px;line-height:1.7;color:#1C1C1A;margin-bottom:10px}
.rc-n{font-size:11px;color:#5C5C58;margin-top:8px;padding-top:8px;border-top:1px solid #eceae4}
.rc-db{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:10px;background:#eef5f1;color:#4a7c59;border:1px solid #c8ddd0}

/* Status fields */
.rc-status{display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid #eceae4}
.rc-sf{display:flex;align-items:center;gap:6px}
.rc-sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:#9C9A92;text-transform:uppercase}
.rc-acc-no{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:#f3f2f0;color:#9C9A92;border:1px solid #e0e0d8}
.rc-acc-yes{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:#eef5f1;color:#4a7c59;border:1px solid #c8ddd0}
.rc-pg-wait{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:#f3f2f0;color:#9C9A92;border:1px solid #e0e0d8}
.rc-pg-ing{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.rc-pg-done{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:#eef5f1;color:#4a7c59;border:1px solid #c8ddd0}
.empty{text-align:center;padding:3rem;color:#9C9A92;font-size:13px}
.loading{text-align:center;padding:2rem;color:#9C9A92;font-size:12px;font-family:'DM Mono',monospace}

.toast{position:fixed;bottom:20px;right:20px;background:#1C1C1A;color:#FAFAF7;padding:10px 18px;border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){.wrap{padding:16px}header{padding:12px 16px}.card{padding:18px}#loginBox{padding:28px 24px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginGate">
  <div id="loginBox">
    <img src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" alt="EnamoR" onerror="this.style.display='none'">
    <div class="lt">問題回報</div>
    <input type="text" id="inName" placeholder="你的名字">
    <input type="password" id="inPwd" placeholder="密碼">
    <button onclick="tryLogin()">進入</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
<header>
  <img src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-B.png" alt="EnamoR" onerror="this.style.display='none'">
  <span class="ht">問題回報</span>
  <div class="sp"></div>
  <span class="ub" id="dispUser"></span>
</header>
<div class="wrap">

  <div class="card">
    <div class="card-t">提交回報</div>
    <div class="fld">
      <label>發生了什麼事</label>
      <textarea id="txContent" placeholder="描述問題或建議，越具體越好（時間、客戶反應、截圖描述…）"></textarea>
    </div>
    <div class="fld">
      <label>分類</label>
      <div class="tr" id="tagRow">
        <button class="tb" onclick="pickTag(this)" data-v="客訴">客訴</button>
        <button class="tb" onclick="pickTag(this)" data-v="Bug">Bug</button>
        <button class="tb" onclick="pickTag(this)" data-v="異常">異常</button>
        <button class="tb" onclick="pickTag(this)" data-v="建議">建議</button>
        <button class="tb" onclick="pickTag(this)" data-v="系統">系統</button>
        <button class="tb" onclick="pickTag(this)" data-v="管理">管理</button>
        <button class="tb" onclick="pickTag(this)" data-v="其他">其他</button>
      </div>
    </div>
    <div class="fld">
      <label>緊急程度</label>
      <div class="ur" id="urgRow">
        <button class="ub2 s1" onclick="pickUrg(this)" data-v="一般">一般</button>
        <button class="ub2" onclick="pickUrg(this)" data-v="緊急">緊急</button>
        <button class="ub2" onclick="pickUrg(this)" data-v="嚴重">嚴重</button>
      </div>
    </div>
    <button class="sbtn" id="btnSubmit" onclick="doSubmit()">提交回報</button>
  </div>

  <div class="hist-t">
    <span>我的回報紀錄</span>
    <button class="rbtn" onclick="loadHist()">↻ 刷新</button>
  </div>
  <div id="histList"><div class="loading">載入中…</div></div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
var SU='https://script.google.com/macros/s/AKfycbz6KCr64lsHly0HVSE70fZ8lKdU315dbspcQoYxyT9Ow0nq6hLhL82S5XFXpRsVX65c/exec';
var PW='28447208';
var user='';
var selTag='';
var selUrg='一般';

/* LOGIN */
function tryLogin(){
  var n=document.getElementById('inName').value.trim();
  var p=document.getElementById('inPwd').value.trim();
  var err=document.getElementById('loginErr');
  if(!n){err.textContent='請輸入名字';err.style.display='block';return}
  if(p!==PW){err.textContent='密碼錯誤';err.style.display='block';return}
  user=n;
  try{sessionStorage.setItem('rpt_user',n)}catch(e){}
  go();
}
function go(){
  document.getElementById('loginGate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('dispUser').textContent=user;
  loadHist();
}
/* auto-login */
try{var sv=sessionStorage.getItem('rpt_user');if(sv){user=sv;go()}}catch(e){}
/* enter keys */
document.getElementById('inPwd').onkeydown=function(e){if(e.key==='Enter')tryLogin()};
document.getElementById('inName').onkeydown=function(e){if(e.key==='Enter')document.getElementById('inPwd').focus()};

/* TAG */
function pickTag(b){
  document.querySelectorAll('#tagRow .tb').forEach(function(x){x.classList.remove('sel')});
  b.classList.add('sel');selTag=b.dataset.v;
}

/* URGENCY */
function pickUrg(b){
  document.querySelectorAll('#urgRow .ub2').forEach(function(x){x.className='ub2'});
  selUrg=b.dataset.v;
  b.classList.add(selUrg==='一般'?'s1':selUrg==='緊急'?'s2':'s3');
}

/* SUBMIT */
function doSubmit(){
  var c=document.getElementById('txContent').value.trim();
  if(!c){showT('請描述問題');return}
  if(!selTag){showT('請選擇分類');return}
  var btn=document.getElementById('btnSubmit');
  btn.disabled=true;btn.textContent='提交中…';
  var d=new Date();
  var ts=String(d.getFullYear()).slice(2)+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');

  fetch(SU,{
    method:'POST',mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      sheet:'task-reports',
      '時間':ts,
      '回報人':user,
      '分類':selTag,
      '緊急程度':selUrg,
      '內容':c,
      '關聯任務':'',
      '進度':'待處理'
    })
  }).then(function(){
    showT('✓ 已提交');
    document.getElementById('txContent').value='';
    document.querySelectorAll('#tagRow .tb').forEach(function(x){x.classList.remove('sel')});
    selTag='';selUrg='一般';
    document.querySelectorAll('#urgRow .ub2').forEach(function(x){x.className='ub2'});
    document.querySelector('#urgRow .ub2[data-v="一般"]').classList.add('s1');
    setTimeout(loadHist,1500);
  }).catch(function(){showT('提交失敗')});

  btn.disabled=false;btn.textContent='提交回報';
}

/* HISTORY */
function loadHist(){
  var el=document.getElementById('histList');
  el.innerHTML='<div class="loading">載入中…</div>';
  fetch(SU+'?sheet=task-reports&t='+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.success||!d.data){el.innerHTML='<div class="empty">載入失敗</div>';return}
      var my=d.data.filter(function(i){return i['回報人']===user}).reverse();
      if(!my.length){el.innerHTML='<div class="empty">還沒有回報紀錄</div>';return}
      el.innerHTML=my.map(function(it){
        var done=it['已處理']==='TRUE'||it['已處理']===true;
        var hn=it['備註']&&String(it['備註']).trim();
        var urg=it['緊急程度']||'一般';
        var uc=urg==='嚴重'?'u3':urg==='緊急'?'u2':'u1';
        var content=it['內容']||'(無內容)';
        var cat=it['分類']||'';
        var accepted=it['受理']||'';
        var progress=it['處理進度']||'待處理';
        if(done)progress='已完成';
        // Format time
        var tm=it['時間']||'';
        if(tm.indexOf('T')>-1)tm=tm.split('T')[0].replace(/-/g,'/');

        // 受理 badge
        var accCls=accepted?'rc-acc-yes':'rc-acc-no';
        var accTxt=accepted||'未受理';

        // 處理進度 badge
        var pgCls='rc-pg-wait';
        if(progress==='處理中')pgCls='rc-pg-ing';
        if(progress==='已完成'||done)pgCls='rc-pg-done';

        return'<div class="rc'+(done?' done':'')+'">' +
          '<div class="rc-top">' +
            (cat?'<span class="rc-tg">'+esc(cat)+'</span>':'') +
            '<span class="rc-urg '+uc+'">'+urg+'</span>' +
            '<span class="rc-tm">'+esc(tm)+'</span>' +
          '</div>' +
          '<div class="rc-c">'+esc(content)+'</div>' +
          '<div class="rc-status">' +
            '<div class="rc-sf"><span class="rc-sl">受理</span><span class="'+accCls+'">'+esc(accTxt)+'</span></div>' +
            '<div class="rc-sf"><span class="rc-sl">進度</span><span class="'+pgCls+'">'+esc(progress)+'</span></div>' +
          '</div>' +
          (hn?'<div class="rc-n">回覆：'+esc(hn)+'</div>':'') +
          '</div>';
      }).join('');
      }).join('');
    })
    .catch(function(){el.innerHTML='<div class="empty">載入失敗，請重試</div>'});
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'):''}
function showT(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2400)}
</script>
</body>
</html>
