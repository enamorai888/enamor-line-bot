<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR 員工助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root {
    --charcoal: #1C1C1A;
    --warm-white: #FAFAF7;
    --cream: #F5F0E8;
    --accent: #8B6F47;
    --accent-light: #C4A882;
    --mid: #5C5C58;
    --light: #9C9A92;
    --border: rgba(28,28,26,0.1);
    --green: #2D6A4F;
    --red: #B5536A;
    --blue: #2E6DA4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    background: var(--warm-white);
    color: var(--charcoal);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === Login === */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; flex-direction: column; gap: 28px;
  }
  .login-overlay.hidden { display: none; }
  .login-logo { height: 32px; margin-bottom: 4px; }
  .login-subtitle { font-size: 12px; color: var(--light); letter-spacing: 2px; text-transform: uppercase; }
  .login-section { text-align: center; color: var(--warm-white); }
  .login-section label { display: block; font-size: 12px; color: var(--light); margin-bottom: 10px; letter-spacing: 1px; }
  .login-input {
    width: 260px; padding: 12px 18px;
    background: rgba(250,250,247,0.06);
    border: 1px solid rgba(250,250,247,0.15);
    color: var(--warm-white);
    font-family: inherit; font-size: 14px; font-weight: 300;
    text-align: center; letter-spacing: 4px; outline: none;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--light); letter-spacing: 1px; font-size: 12px; }
  .staff-select {
    width: 260px; padding: 12px 18px;
    background: rgba(250,250,247,0.06);
    border: 1px solid rgba(250,250,247,0.15);
    color: var(--warm-white);
    font-family: inherit; font-size: 14px; font-weight: 300;
    text-align: center; outline: none; appearance: none; cursor: pointer;
  }
  .staff-select option { background: var(--charcoal); color: var(--warm-white); }
  .login-btn {
    margin-top: 8px; width: 260px; padding: 14px;
    background: var(--accent); color: var(--warm-white);
    border: none; font-family: inherit; font-size: 12px;
    font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: #6B5535; }
  .login-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }

  /* === Header === */
  .header {
    background: var(--warm-white);
    text-align: center;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative;
  }
  .header-logo { height: 20px; margin-bottom: 8px; }
  .staff-badge {
    position: absolute; top: 16px; right: 16px;
    font-size: 10px; font-weight: 400;
    letter-spacing: 1px; color: var(--light);
    background: rgba(28,28,26,0.04);
    padding: 3px 10px; border-radius: 2px;
  }

  /* === Mode Tabs === */
  .mode-tabs {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1; padding: 10px 8px;
    font-family: inherit; font-size: 11px; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--light); background: none; border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-tab.active { color: var(--charcoal); border-bottom-color: var(--charcoal); }
  .mode-tab:hover:not(.active) { color: var(--mid); }

  /* === Chat === */
  .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 88%; line-height: 1.7; font-size: 14px; }
  .msg-user {
    align-self: flex-end;
    background: var(--charcoal); color: var(--warm-white);
    padding: 10px 16px; border-radius: 16px 16px 4px 16px;
  }
  .msg-ai {
    align-self: flex-start;
    background: white; padding: 14px 16px;
    border-radius: 16px 16px 16px 4px;
    border: 1px solid var(--border);
  }
  .msg-ai .label {
    font-size: 10px; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px; display: block;
  }
  .msg-cs .label { color: var(--blue); }

  /* Result card for CS mode */
  .cs-result {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-top: 4px;
    align-self: flex-start; max-width: 92%;
  }
  .cs-tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .cs-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-weight: 400; letter-spacing: 0.5px;
  }
  .tag-tone-抱怨 { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
  .tag-tone-催促 { background: #fff8f0; color: #c2570a; border: 1px solid #fed7aa; }
  .tag-tone-詢問 { background: #f0f7ff; color: var(--blue); border: 1px solid #bfdbfe; }
  .tag-tone-要求 { background: #fdf4ff; color: #7c3aed; border: 1px solid #e9d5ff; }
  .tag-scene { background: rgba(28,28,26,0.05); color: var(--mid); border: 1px solid var(--border); }
  .cs-section-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--light); margin-bottom: 8px;
  }
  .cs-script {
    background: var(--cream); border-radius: 8px;
    padding: 14px; font-size: 14px; line-height: 1.8;
    white-space: pre-wrap; margin-bottom: 12px;
    border-left: 3px solid var(--accent);
  }
  .cs-copy-btn {
    width: 100%; padding: 10px;
    background: var(--charcoal); color: var(--warm-white);
    border: none; font-family: inherit; font-size: 11px;
    font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; transition: background 0.2s;
  }
  .cs-copy-btn:hover { background: var(--accent); }
  .cs-copy-btn.copied { background: var(--green); }
  .cs-note { font-size: 12px; color: var(--light); margin-top: 10px; line-height: 1.6; }
  .cs-stock-info {
    background: #f0f7ff; border: 1px solid #bfdbfe;
    border-radius: 6px; padding: 10px 12px;
    font-size: 12px; color: var(--blue); margin-bottom: 12px;
  }

  /* Code block */
  .code-block-wrapper { margin: 10px 0 6px; background: var(--charcoal); border-radius: 8px; overflow: hidden; }
  .code-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px;
    background: rgba(250,250,247,0.06);
    border-bottom: 1px solid rgba(250,250,247,0.08);
  }
  .code-block-header span { font-size: 11px; color: var(--light); letter-spacing: 1px; }
  .copy-btn {
    font-family: inherit; font-size: 11px; font-weight: 400;
    color: var(--accent-light); background: none;
    border: 1px solid rgba(196,168,130,0.3);
    padding: 2px 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--accent); color: var(--warm-white); border-color: var(--accent); }
  .copy-btn.copied { background: var(--green); border-color: var(--green); color: var(--warm-white); }
  .code-block-body { padding: 12px; overflow-x: auto; }
  .code-block-body pre {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; line-height: 1.6;
    color: #e0ddd5; white-space: pre-wrap; word-break: break-all;
  }

  /* Typing */
  .typing {
    align-self: flex-start; display: flex; gap: 4px;
    padding: 10px 18px; background: white;
    border-radius: 16px; border: 1px solid var(--border);
  }
  .typing span { width: 5px; height: 5px; background: var(--light); border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .welcome { text-align: center; padding: 40px 24px; color: var(--mid); }
  .welcome p { font-size: 13px; line-height: 1.8; }

  /* === Bottom === */
  .bottom-area { border-top: 1px solid var(--border); background: var(--warm-white); flex-shrink: 0; }

  /* Shopify mode input */
  .shopify-input-area { display: flex; flex-direction: column; }
  .input-row { display: flex; align-items: flex-end; padding: 12px 16px 8px; gap: 8px; }
  .input-field {
    flex: 1; min-height: 40px; max-height: 100px;
    padding: 10px 14px; border: 1px solid rgba(28,28,26,0.15);
    background: white; font-family: inherit; font-size: 14px;
    font-weight: 300; line-height: 1.5; resize: none; outline: none;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--light); }
  .send-btn {
    height: 40px; width: 40px;
    background: var(--charcoal); color: var(--warm-white);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  .quick-bar { display: flex; border-top: 1px solid var(--border); }
  .quick-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    padding: 12px 4px;
    font-family: inherit; font-size: 11px; font-weight: 400;
    color: var(--mid); background: none; border: none;
    border-right: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
  }
  .quick-item:last-child { border-right: none; }
  .quick-item:hover { background: var(--cream); color: var(--accent); }
  .quick-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* CS mode input */
  .cs-input-area { display: flex; flex-direction: column; gap: 0; }
  .cs-input-row { padding: 12px 16px 6px; display: flex; flex-direction: column; gap: 8px; }
  .cs-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--light); margin-bottom: 2px; }
  .cs-textarea {
    width: 100%; padding: 10px 14px;
    border: 1px solid rgba(28,28,26,0.15);
    background: white; font-family: inherit; font-size: 14px;
    font-weight: 300; line-height: 1.5; resize: none; outline: none;
    min-height: 60px; max-height: 100px;
  }
  .cs-textarea:focus { border-color: var(--blue); }
  .cs-textarea::placeholder { color: var(--light); }
  .cs-extra-row { display: flex; gap: 8px; padding: 0 16px 8px; }
  .cs-extra-input {
    flex: 1; padding: 8px 12px;
    border: 1px solid rgba(28,28,26,0.12);
    background: white; font-family: inherit; font-size: 13px;
    font-weight: 300; outline: none; color: var(--mid);
  }
  .cs-extra-input:focus { border-color: var(--blue); }
  .cs-extra-input::placeholder { color: var(--light); font-size: 12px; }
  .cs-send-btn {
    padding: 0 20px; height: 36px;
    background: var(--charcoal); color: var(--warm-white);
    border: none; font-family: inherit; font-size: 11px;
    font-weight: 400; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .cs-send-btn:hover { background: var(--blue); }
  .cs-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .cs-quick-bar { display: flex; border-top: 1px solid var(--border); }
  .cs-quick-item {
    flex: 1; padding: 10px 4px;
    font-family: inherit; font-size: 11px; font-weight: 400;
    color: var(--mid); background: none; border: none;
    border-right: 1px solid var(--border); cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .cs-quick-item:last-child { border-right: none; }
  .cs-quick-item:hover { background: #f0f7ff; color: var(--blue); }

  /* Progress bar */
  .progress-bar {
    display: flex; align-items: center; justify-content: center;
    padding: 10px 16px; gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--warm-white); flex-shrink: 0;
  }
  .progress-step {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 400; color: var(--light);
    transition: color 0.3s;
  }
  .progress-step.active { color: var(--accent); }
  .progress-step.done { color: var(--green); }
  .progress-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--light);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; transition: all 0.3s;
  }
  .progress-step.active .progress-dot { border-color: var(--accent); background: var(--accent); color: white; }
  .progress-step.done .progress-dot { border-color: var(--green); background: var(--green); color: white; }
  .progress-line { width: 32px; height: 1px; background: var(--light); margin: 0 8px; transition: background 0.3s; }
  .progress-line.done { background: var(--green); }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .hidden { display: none !important; }
</style>
</head>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-section">

<script>
// ── 設定 ──────────────────────────────────────────────
const PROXY_URL = '/api/claude-proxy';
const PROXY_TOKEN = '28447208';
const OMS_PROXY = 'https://enamor-oms.vercel.app/api/oms-proxy';
const PASSWORD = '28447208';
const MODEL = 'claude-sonnet-4-6';
const CASE_COLLECTOR_URL = '/api/case-collector';
const SHEET_ID = '1jYnzBWyvF23asaPFjqYaEl5LXOg77inIaJlCMkzdOS8';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E5%B7%A5%E4%BD%9C%E8%A1%A81`;
const LOG_SHEET_URL = '';

let currentStaff = '';
let currentMode = 'shopify';
let shopifyHistory = [];
let csHistory = [];
let productData = [];
let currentProgress = 1;

// ── 商品對照表 ──────────────────────────────────────
async function loadProductSheet() {
  try {
    const res = await fetch(SHEET_CSV_URL);
    const csv = await res.text();
    const rows = csv.split('\n').map(r => {
      const cells = [];
      let current = '', inQuote = false;
      for (let i = 0; i < r.length; i++) {
        const ch = r[i];
        if (ch === '"') { inQuote = !inQuote; continue; }
        if (ch === ',' && !inQuote) { cells.push(current.trim()); current = ''; continue; }
        current += ch;
      }
      cells.push(current.trim());
      return cells;
    });
    if (rows.length < 2) return;
    const headers = rows[0];
    productData = rows.slice(1).filter(r => r.length > 4 && r[4]).map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = r[i] || ''; });
      return obj;
    });
  } catch(e) { console.error('載入商品對照表失敗:', e); }
}

function lookupProduct(query) {
  const q = query.toUpperCase().replace(/\s/g, '');
  const candidates = [q];
  const parts = q.split('-');
  for (let i = parts.length - 1; i >= 2; i--) candidates.push(parts.slice(0, i).join('-'));
  for (const candidate of candidates) {
    for (const row of productData) {
      const sku = (row['商品編號'] || '').toUpperCase().replace(/\s/g, '');
      if (sku === candidate && row['Shopify Product ID']) return [row];
    }
  }
  const seen = new Set();
  return productData.filter(row => {
    const sku = (row['商品編號'] || '').toUpperCase().replace(/\s/g, '');
    if (row['Shopify Product ID'] && sku && q.startsWith(sku) && !seen.has(sku)) { seen.add(sku); return true; }
    return false;
  });
}

function extractProductCode(text) {
  const urlMatch = text.match(/enamorshop\.com\/products\/([a-zA-Z0-9\-\.]+)/i);
  if (urlMatch) return urlMatch[1].split('?')[0];
  const patterns = [
    /(?:商品編號|商品|編號|handle|ID)\s*(?:是|為|:：)?\s*([A-Za-z0-9\-\.]+)/i,
    /\b(\d{3}-[A-Za-z0-9\-\.]+)/,
    /\b(SEM[LMH][A-Z]*)\b/i,
  ];
  for (const p of patterns) { const m = text.match(p); if (m) return m[1]; }
  return null;
}

function buildProductContext(text) {
  const code = extractProductCode(text);
  if (!code) return '';
  const rows = lookupProduct(code);
  if (!rows.length) return '';
  const r = rows[0];
  const pid = r['Shopify Product ID'] || '（無）';
  let ctx = `\n\n【商品對照表查詢結果 — 商品編號: ${r['商品編號']}】`;
  if (pid) ctx += `\nShopify Product ID: ${pid}`;
  if (r['廠商名稱']) ctx += `\n廠商: ${r['廠商編號']} ${r['廠商名稱']}`;
  if (r['Series']) ctx += `\n系列: ${r['Series']}`;
  if (r['Mat']) ctx += `\n材質分類: ${r['Mat']}`;
  if (r['褲身材質']) ctx += `\n褲身材質: ${r['褲身材質']}`;
  if (r['褲底材質']) ctx += `\n褲底材質: ${r['褲底材質']}`;
  if (r['產地']) ctx += `\n產地: ${r['產地']}`;
  ctx += `\n（Shopify Product ID 可直接用於 API 操作）`;
  return ctx;
}

// ── Progress ────────────────────────────────────────
function updateProgress(step) {
  currentProgress = step;
  for (let i = 1; i <= 3; i++) {
    const s = document.getElementById('pStep' + i);
    const l = document.getElementById('pLine' + (i - 1));
    s.className = 'progress-step' + (i < step ? ' done' : i === step ? ' active' : '');
    if (l) l.className = 'progress-line' + (i <= step ? ' done' : '');
  }
}
function detectProgress(text) {
  if (/enamorshop\.com\/products\/|shopify\.com|^https?:\/\//.test(text) || /\b\d{13,}\b/.test(text)) {
    if (currentProgress < 2) updateProgress(2);
  }
}

async function queryOmsStock(skuKeyword) {
  try {
    const res = await fetch(OMS_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-proxy-token': PROXY_TOKEN },
      body: JSON.stringify({
        endpoint: '/api/v2/default/getStocksData/searchList',
        body: { 'view_products_stock.stock_group': '10' }
      })
    });
    const data = await res.json();
    const items = data.retval || [];
    const keyword = skuKeyword.toLowerCase();
    const matched = items.filter(i => {
      const model = (i['view_products_stock.products_model'] || '').toLowerCase();
      const name = (i['view_products_stock.products_name'] || '').toLowerCase();
      return model.includes(keyword) || name.includes(keyword);
    });
    if (!matched.length) return null;
    return matched.slice(0, 5).map(i => ({
      sku: i['view_products_stock.products_model'],
      name: i['view_products_stock.products_name'],
      qty: parseInt(i['view_products_stock.stock_qty'] || 0)
    }));
  } catch(e) { return null; }
}

function addMessage(text, type) {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg msg-' + type;
  if (type === 'user') {
    d.textContent = text;
  } else {
    d.innerHTML = `<span class="label">${currentMode === 'cs' ? '客服助手' : '操作助手'}</span>` + formatAI(text);
  }
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function formatAI(text) {
  const parts = []; let last = 0;
  const re = /```(\w*)\n([\s\S]*?)```/g; let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ t: 'txt', c: text.slice(last, m.index) });
    parts.push({ t: 'code', c: m[2].trim() });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ t: 'txt', c: text.slice(last) });
  return parts.map(p => {
    if (p.t === 'code') {
      const id = 'c' + Date.now() + Math.random().toString(36).substr(2, 4);
      return `<div class="code-block-wrapper"><div class="code-block-header"><span>DevConsole</span><button class="copy-btn" onclick="copyCode('${id}',this)">複製</button></div><div class="code-block-body"><pre id="${id}">${esc(p.c)}</pre></div></div>`;
    }
    return esc(p.c).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyCode(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.textContent = '已複製'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
  });
}
