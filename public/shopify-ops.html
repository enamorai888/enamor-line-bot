<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnamoR Shopify 操作助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root {
    --charcoal: #1C1C1A;
    --warm-white: #FAFAF7;
    --cream: #F5F0E8;
    --accent: #8B6F47;
    --accent-light: #C4A882;
    --mid: #5C5C58;
    --light: #9C9A92;
    --border: rgba(28,28,26,0.1);
    --green: #2D6A4F;
    --red: #B5536A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    background: var(--warm-white);
    color: var(--charcoal);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === Login === */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; flex-direction: column; gap: 28px;
  }
  .login-overlay.hidden { display: none; }
  .login-logo { height: 32px; margin-bottom: 4px; }
  .login-subtitle {
    font-size: 12px; color: var(--light);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .login-section { text-align: center; color: var(--warm-white); }
  .login-section label {
    display: block; font-size: 12px; color: var(--light);
    margin-bottom: 10px; letter-spacing: 1px;
  }
  .login-input {
    width: 260px; padding: 12px 18px;
    background: rgba(250,250,247,0.06);
    border: 1px solid rgba(250,250,247,0.15);
    color: var(--warm-white);
    font-family: inherit; font-size: 14px; font-weight: 300;
    text-align: center; letter-spacing: 4px; outline: none;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--light); letter-spacing: 1px; font-size: 12px; }
  .staff-select {
    width: 260px; padding: 12px 18px;
    background: rgba(250,250,247,0.06);
    border: 1px solid rgba(250,250,247,0.15);
    color: var(--warm-white);
    font-family: inherit; font-size: 14px; font-weight: 300;
    text-align: center; outline: none; appearance: none; cursor: pointer;
  }
  .staff-select option { background: var(--charcoal); color: var(--warm-white); }
  .login-btn {
    margin-top: 8px; width: 260px; padding: 14px;
    background: var(--accent); color: var(--warm-white);
    border: none; font-family: inherit; font-size: 12px;
    font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: #6B5535; }
  .login-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }

  /* === Header === */
  .header {
    background: var(--warm-white);
    text-align: center;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative;
  }
  .header-logo { height: 20px; margin-bottom: 6px; }
  .header-title {
    font-size: 11px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase; color: var(--light);
  }
  .staff-badge {
    position: absolute; top: 16px; right: 16px;
    font-size: 10px; font-weight: 400;
    letter-spacing: 1px; color: var(--light);
    background: rgba(28,28,26,0.04);
    padding: 3px 10px; border-radius: 2px;
  }

  /* === Chat === */
  .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 88%; line-height: 1.7; font-size: 14px; }
  .msg-user {
    align-self: flex-end;
    background: var(--charcoal); color: var(--warm-white);
    padding: 10px 16px; border-radius: 16px 16px 4px 16px;
  }
  .msg-ai {
    align-self: flex-start;
    background: white; padding: 14px 16px;
    border-radius: 16px 16px 16px 4px;
    border: 1px solid var(--border);
  }
  .msg-ai .label {
    font-size: 10px; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px; display: block;
  }

  /* Code block */
  .code-block-wrapper {
    margin: 10px 0 6px; background: var(--charcoal);
    border-radius: 8px; overflow: hidden;
  }
  .code-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px;
    background: rgba(250,250,247,0.06);
    border-bottom: 1px solid rgba(250,250,247,0.08);
  }
  .code-block-header span { font-size: 11px; color: var(--light); letter-spacing: 1px; }
  .copy-btn {
    font-family: inherit; font-size: 11px; font-weight: 400;
    color: var(--accent-light); background: none;
    border: 1px solid rgba(196,168,130,0.3);
    padding: 2px 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--accent); color: var(--warm-white); border-color: var(--accent); }
  .copy-btn.copied { background: var(--green); border-color: var(--green); color: var(--warm-white); }
  .code-block-body { padding: 12px; overflow-x: auto; }
  .code-block-body pre {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; line-height: 1.6;
    color: #e0ddd5; white-space: pre-wrap; word-break: break-all;
  }

  /* Typing */
  .typing {
    align-self: flex-start; display: flex; gap: 4px;
    padding: 10px 18px; background: white;
    border-radius: 16px; border: 1px solid var(--border);
  }
  .typing span {
    width: 5px; height: 5px; background: var(--light);
    border-radius: 50%; animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Welcome */
  .welcome { text-align: center; padding: 40px 24px; color: var(--mid); }
  .welcome p { font-size: 13px; line-height: 1.8; }

  /* === Bottom === */
  .bottom-area { border-top: 1px solid var(--border); background: var(--warm-white); flex-shrink: 0; }
  .input-row { display: flex; align-items: flex-end; padding: 12px 16px 8px; gap: 8px; }
  .input-field {
    flex: 1; min-height: 40px; max-height: 100px;
    padding: 10px 14px; border: 1px solid rgba(28,28,26,0.15);
    background: white; font-family: inherit; font-size: 14px;
    font-weight: 300; line-height: 1.5; resize: none; outline: none;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--light); }
  .send-btn {
    height: 40px; width: 40px;
    background: var(--charcoal); color: var(--warm-white);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  .quick-bar { display: flex; border-top: 1px solid var(--border); }
  .quick-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    padding: 12px 4px;
    font-family: inherit; font-size: 11px; font-weight: 400;
    color: var(--mid); background: none; border: none;
    border-right: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
  }
  .quick-item:last-child { border-right: none; }
  .quick-item:hover { background: var(--cream); color: var(--accent); }
  .quick-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">

    <div class="welcome" id="welcome">

      <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>

<script>
const PROXY_URL = '/api/claude-proxy';
const PROXY_TOKEN = '28447208';
const PASSWORD = '28447208';
const MODEL = 'claude-sonnet-4-6';
const LOG_SHEET_URL = ''; // 部署 Apps Script 後填入

let currentStaff = '';
let conversationHistory = [];

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const pw = document.getElementById('loginInput').value;
  const staff = document.getElementById('staffSelect').value;
  const err = document.getElementById('loginError');
  if (!staff) { err.textContent = '請選擇操作人員'; return; }
  if (pw !== PASSWORD) { err.textContent = '密碼錯誤'; document.getElementById('loginInput').value = ''; return; }
  currentStaff = staff;
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('staffBadge').textContent = staff;
  document.getElementById('inputField').focus();
  logToSheet('登入', staff + ' 登入系統');
}

const SYSTEM_PROMPT = `你是 EnamoR 的 Shopify 操作助手。員工會用中文告訴你要做什麼，你產出可以直接貼到 Shopify 後台 DevConsole 執行的 JavaScript 程式碼。

## 重要規則
1. 所有腳本用 void async function(){...}(); 包裹
2. 變數用 _B（API路徑）和 _c（csrfToken），標準模板：
const _B = '/store/enamor-5/admin/api/2024-01';
const _c = (() => { const s = [...document.querySelectorAll('script:not([src])')].map(e => e.textContent).join(''); const m = s.match(/"csrfToken":"([^"]+)"/); return m ? m[1] : ''; })();
3. fetch 帶 headers: { 'X-CSRF-Token': _c, 'Content-Type': 'application/json' }
4. 用繁體中文回覆，先說明再給程式碼
5. 程式碼含 console.log 顯示進度
6. 需求不明確先問

## Metafield 完整欄位定義（以下為實際儲存位置，禁止猜測）

### 商品運營類
| key | namespace | type | 說明 |
|-----|-----------|------|------|
| preorder_type | custom | single_line_text | 預購類型：a1/a2/b，清空=非預購 |
| split_colors | custom | boolean | 展開顏色為獨立商品卡片，EnTry99 填 false |
| swatch_colors | custom | single_line_text | 色卡定義，格式：黑=#1a1a1a,白皙膚=#f0d9c0 |
| max_qty | custom | number_integer | 單次最大購買數量 |

### 商品規格類（前台商品描述區顯示）
| key | namespace | type | 說明 | 範例值 |
|-----|-----------|------|------|--------|
| material_text | custom | single_line_text | 成份+尺寸文字+產地（全部在同一個欄位） | 90% 尼龍(抗菌紗、涼感紗)、10% 彈性纖維(杜邦萊卡)【M】彈性極佳 中腰圍23-34吋...產地：台灣 Made in Taiwan |
| size_guide | custom | json | 尺寸建議表格 | [{"size":"M SIZE","note":"版型正常/彈性極佳 市售褲子尺寸XL 以下適穿"},{"size":"L SIZE","note":"版型正常/彈性極佳 市售褲子尺寸2L 以下適穿"}] |
| size_options | custom | json | 可選尺寸 | ["L","XL"] |

### 商品體感類
| key | namespace | type | 說明 |
|-----|-----------|------|------|
| stretch_score | custom | number_integer | 彈性分數 1-5 |
| compression_feel | custom | single_line_text | Soft/Balanced/Firm |
| size_tolerance | custom | single_line_text | Narrow/Medium/Wide |

### 重要注意
- 成份、產地、尺寸文字描述都存在 material_text，是同一個欄位
- size_guide 是 JSON 格式，更新時要維持 JSON 結構
- 修改 metafield 前必須先查現有值（GET /products/ID/metafields.json），取得 metafield ID 後用 PUT 更新
- 新增 metafield 用 POST，更新已存在的用 PUT（需要 metafield ID）

## 預購/售罄
有 preorder_type → inventory_policy: continue → 庫存0顯示預購
無 preorder_type → inventory_policy: deny → 庫存0顯示售完
全規格庫存0且不預購 → status: draft（下架）

## API
查商品（用 handle）: GET /products.json?handle=HANDLE&fields=id,handle,title,status,variants
查商品（用 ID）: GET /products/ID.json?fields=id,handle,title,status,variants
用 handle 查 ID: GET /products.json?handle=HANDLE&fields=id,handle,title
查metafields: GET /products/ID/metafields.json
改variant: PUT /variants/ID.json {variant:{id,inventory_policy}}
新增metafield: POST /products/ID/metafields.json {metafield:{namespace:'custom',key,value,type:'single_line_text'}}
更新metafield: PUT /metafields/ID.json {metafield:{id,value}}
改狀態: PUT /products/ID.json {product:{id,status}}

## 員工操作習慣
- 員工可能給 handle、product ID、或商品網址，三種都要支援
- 如果員工給 ID（純數字），直接用 /products/ID.json 查
- 如果員工給 handle（含英文和連字號），用 /products.json?handle=HANDLE 查
- 如果員工貼網址（如 https://enamorshop.com/products/201-seml），從網址擷取 /products/ 後面的部分當 handle
- 所有修改操作（改售罄、改 metafield 等）都用 product ID 執行`;

function quickSend(text) {
  const field = document.getElementById('inputField');
  field.value = text;
  field.focus();
  const p = text.indexOf('xxx');
  if (p > -1) field.setSelectionRange(p, p + 3);
}

async function sendMessage() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;
  const w = document.getElementById('welcome');
  if (w) w.remove();
  addMessage(text, 'user');
  input.value = ''; input.style.height = 'auto';
  conversationHistory.push({ role: 'user', content: text });
  document.getElementById('sendBtn').disabled = true;
  const typing = showTyping();
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-proxy-token': PROXY_TOKEN },
      body: JSON.stringify({ model: MODEL, max_tokens: 4096, system: SYSTEM_PROMPT, messages: conversationHistory })
    });
    const data = await res.json();
    typing.remove();
    if (data.content && data.content.length > 0) {
      const aiText = data.content.map(c => c.text || '').join('');
      conversationHistory.push({ role: 'assistant', content: aiText });
      addMessage(aiText, 'ai');
      logToSheet('對話', text.substring(0, 80));
    } else if (data.error) {
      addMessage('API 錯誤：' + (data.error.message || JSON.stringify(data.error)), 'ai');
    } else {
      addMessage('沒有收到回覆，請重試。', 'ai');
    }
  } catch (err) { typing.remove(); addMessage('連線錯誤：' + err.message, 'ai'); }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inputField').focus();
}

function addMessage(text, type) {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg msg-' + type;
  d.innerHTML = type === 'ai' ? '<span class="label">操作助手</span>' + formatAI(text) : '';
  if (type === 'user') d.textContent = text;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function formatAI(text) {
  const parts = []; let last = 0;
  const re = /```(\w*)\n([\s\S]*?)```/g; let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ t: 'txt', c: text.slice(last, m.index) });
    parts.push({ t: 'code', c: m[2].trim() });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ t: 'txt', c: text.slice(last) });
  return parts.map(p => {
    if (p.t === 'code') {
      const id = 'c' + Date.now() + Math.random().toString(36).substr(2, 4);
      return `<div class="code-block-wrapper"><div class="code-block-header"><span>DevConsole</span><button class="copy-btn" onclick="copyCode('${id}',this)">複製</button></div><div class="code-block-body"><pre id="${id}">${esc(p.c)}</pre></div></div>`;
    }
    return esc(p.c).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyCode(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.textContent = '已複製'; btn.classList.add('copied');
    logToSheet('複製程式碼', document.getElementById(id).textContent.substring(0, 60));
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
  });
}

function showTyping() {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  el.appendChild(d); el.scrollTop = el.scrollHeight;
  return d;
}

function logToSheet(action, detail) {
  if (!LOG_SHEET_URL) return;
  fetch(LOG_SHEET_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ timestamp: new Date().toISOString(), staff: currentStaff, action, detail: detail || '' })
  }).catch(() => {});
}
